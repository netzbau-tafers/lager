<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil</title>
  <link rel="icon" type="image/png" sizes="48x48" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body{
      font-family:Arial, sans-serif;
      background:#e6eaef;
      margin:40px;
      color:#222;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      gap:15px;
    }

    .header h1{
      margin:0;
      font-size:32px;
    }

    .menu-wrap{
      position:relative;
    }

    .menu-button{
      background:#555;
      color:white;
      border:none;
      border-radius:10px;
      padding:11px 15px;
      font-size:20px;
      line-height:1;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:48px;
      min-height:44px;
      box-shadow:0 2px 6px rgba(0,0,0,0.10);
      transition:background 0.2s ease;
    }

    .menu-button:hover{
      background:#333;
    }

    .dropdown-menu{
      display:none;
      position:absolute;
      top:52px;
      right:0;
      min-width:220px;
      background:white;
      border:1px solid #ccc;
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,0.12);
      padding:8px;
      z-index:3000;
    }

    .dropdown-menu.open{
      display:block;
    }

    .dropdown-menu button{
      width:100%;
      text-align:left;
      margin:0 0 8px 0;
    }

    .dropdown-menu button:last-child{
      margin-bottom:0;
    }

    .active-page{
      background:#e0e0e0 !important;
      color:#333 !important;
      cursor:default;
    }

    button{
      padding:10px 14px;
      cursor:pointer;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:white;
      margin:2px;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:background 0.2s ease;
    }

    button:hover{
      background:#2980b9;
    }

    .logout-safe{
      background:#777;
    }

    .logout-safe:hover{
      background:#555;
    }

    .card{
      max-width:720px;
      margin:0 auto;
      background:white;
      border:1px solid #d5dbe3;
      border-radius:14px;
      box-shadow:0 8px 22px rgba(0,0,0,0.08);
      padding:22px;
    }

    input{
      width:100%;
      padding:10px;
      margin:6px 0 12px 0;
      box-sizing:border-box;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:15px;
    }

    .muted{color:#555;font-size:14px}
    .info{font-size:14px;margin-top:10px}

    @media (max-width: 680px){
      body{
        margin:18px;
      }

      .header h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 style="margin:0;font-size:24px;">Profil</h1>
    <div class="menu-wrap">
      <button class="menu-button" onclick="toggleMenu(event)" title="Menü öffnen"><i class="fa-solid fa-bars"></i></button>
      <div id="dropdownMenu" class="dropdown-menu">
        <button onclick="goToHome()"><i class="fa-solid fa-house"></i> Startseite</button>
        <button onclick="goToKabellager()"><i class="fa-solid fa-warehouse"></i> Kabellager</button>
        <button onclick="goToBaustellen()"><i class="fa-solid fa-screwdriver-wrench"></i> Baustellenmaterial</button>
        <button class="active-page" onclick="closeMenu()"><i class="fa-solid fa-user"></i> Profil</button>
        <button class="logout-safe" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </div>
  </div>

  <section class="card">
    <label for="usernameInput"><strong>Benutzername</strong></label>
    <input id="usernameInput" type="text" maxlength="120" placeholder="z. B. Max Muster">
    <button onclick="saveUsername()"><i class="fa-solid fa-floppy-disk"></i> Benutzername speichern</button>
    <p class="muted">Wenn kein Benutzername gesetzt ist, wird weiterhin die E-Mail angezeigt.</p>

    <hr style="margin:18px 0; border:none; border-top:1px solid #eee;">

    <button onclick="resetPassword()"><i class="fa-solid fa-key"></i> Passwort zurücksetzen</button>
    <p id="profileInfo" class="info"></p>
  </section>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
      authDomain: "netzbau-tafers.firebaseapp.com",
      projectId: "netzbau-tafers",
      storageBucket: "netzbau-tafers.appspot.com",
      messagingSenderId: "389541837675",
      appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
      measurementId: "G-B5MJGD3108"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const usersCollection = db.collection("users");

    function sanitizeInput(value, maxLength = 120){
      return String(value || "")
        .replace(/[<>]/g, "")
        .replace(/[\u0000-\u001F\u007F]/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, maxLength);
    }

    function toggleMenu(event){
      event.stopPropagation();
      document.getElementById("dropdownMenu").classList.toggle("open");
    }

    function closeMenu(){
      document.getElementById("dropdownMenu").classList.remove("open");
    }

    function goToHome(){ closeMenu(); window.location.href = "home.html"; }
    function goToKabellager(){ closeMenu(); window.location.href = "index.html"; }
    function goToBaustellen(){ closeMenu(); window.location.href = "baustellen.html"; }

    function logout(){
      closeMenu();
      if(!confirm("Wirklich ausloggen?")) return;
      auth.signOut().then(() => {
        localStorage.removeItem("lagerUsername");
        window.location.href = "home.html";
      });
    }

    function setInfo(message, isError = false){
      const el = document.getElementById("profileInfo");
      el.textContent = message;
      el.style.color = isError ? "#b3261e" : "#1b5e20";
    }

    function saveUsername(){
      const user = auth.currentUser;
      if(!user){
        setInfo("Nicht eingeloggt.", true);
        return;
      }

      const username = sanitizeInput(document.getElementById("usernameInput").value, 120);

      usersCollection.doc(user.uid).set({
        username: username,
        email: user.email || "",
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true })
        .then(() => {
          if(username){
            localStorage.setItem("lagerUsername", username);
          }else{
            localStorage.removeItem("lagerUsername");
          }
          setInfo("Profil gespeichert.");
        })
        .catch((error) => {
          console.error("Profil speichern fehlgeschlagen:", error);
          setInfo("Profil konnte nicht gespeichert werden.", true);
        });
    }

    function resetPassword(){
      const user = auth.currentUser;
      const email = user && user.email ? user.email : "";
      if(!email){
        setInfo("Keine E-Mail verfügbar.", true);
        return;
      }

      auth.sendPasswordResetEmail(email)
        .then(() => setInfo(`E-Mail zum Zurücksetzen wurde an ${email} gesendet.`))
        .catch((error) => {
          console.error("Passwort zurücksetzen Fehler:", error);
          setInfo("Zurücksetzen fehlgeschlagen.", true);
        });
    }

    auth.onAuthStateChanged((user) => {
      if(!user){
        window.location.href = "home.html";
        return;
      }

      usersCollection.doc(user.uid).get().then((doc) => {
        const data = doc.exists ? (doc.data() || {}) : {};
        document.getElementById("usernameInput").value = sanitizeInput(data.username || "", 120);
      });
    });

    document.addEventListener("click", (event) => {
      const menu = document.getElementById("dropdownMenu");
      const wrap = document.querySelector(".menu-wrap");
      if(menu.classList.contains("open") && !wrap.contains(event.target)){
        closeMenu();
      }
    });
  </script>
</body>
</html>
