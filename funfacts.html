<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Facts</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{
  font-family:Arial, sans-serif;
  background:#e6eaef;
  margin:40px;
  color:#222;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  gap:15px;
}

.header h1{
  margin:0;
}

.menu-wrap{
  position:relative;
}

.menu-button{
  background:#555;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 14px;
  font-size:22px;
  line-height:1;
  cursor:pointer;
}

.menu-button:hover{
  background:#333;
}

.dropdown-menu{
  display:none;
  position:absolute;
  top:48px;
  right:0;
  min-width:240px;
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
  padding:8px;
  z-index:2000;
}

.dropdown-menu.open{
  display:block;
}

.dropdown-menu button{
  width:100%;
  text-align:left;
  margin:0 0 8px 0;
}

.dropdown-menu button:last-child{
  margin-bottom:0;
}

.logout-safe{
  background:#777;
}

.logout-safe:hover{
  background:#555;
}

button{
  padding:10px 14px;
  cursor:pointer;
  border:none;
  border-radius:6px;
  background:#3498db;
  color:white;
  margin:2px;
  font-size:14px;
}

button:hover{
  background:#2980b9;
}

.back{
  background:#555;
}

.back:hover{
  background:#333;
}

.panel{
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  padding:16px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.filter-grid{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:12px;
  align-items:end;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  font-weight:bold;
  color:#333;
}

select{
  width:100%;
  padding:10px;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
  background:white;
}

.info-box{
  margin:10px 0 20px 0;
  font-size:14px;
  color:#444;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
  margin-bottom:20px;
}

.stat-card{
  background:white;
  border:1px solid #ddd;
  border-radius:12px;
  padding:18px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.stat-title{
  font-size:14px;
  color:#555;
  margin-bottom:8px;
}

.stat-value{
  font-size:28px;
  font-weight:bold;
  color:#222;
}

.section-title{
  font-size:18px;
  font-weight:bold;
  margin:0 0 12px 0;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:left;
  vertical-align:middle;
}

th{
  background:#2c3e50;
  color:white;
}

.empty-box{
  background:white;
  border:1px dashed #bbb;
  border-radius:10px;
  padding:20px;
  text-align:center;
  color:#666;
}

.login-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#e6eaef;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
  padding:20px;
  box-sizing:border-box;
}

.login-card{
  background:white;
  width:420px;
  max-width:95%;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  box-sizing:border-box;
}

.login-card h2{
  margin-top:0;
  text-align:center;
}

.login-info{
  color:#555;
  font-size:14px;
  text-align:center;
  margin-bottom:15px;
}

.login-error{
  color:#c0392b;
  display:none;
  margin-top:10px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

@media (max-width: 900px){
  body{
    margin:15px;
  }

  .header h1{
    font-size:28px;
  }

  .filter-grid{
    grid-template-columns:1fr;
  }

  .menu-button{
    font-size:24px;
    padding:12px 16px;
  }

  .dropdown-menu{
    min-width:250px;
  }

  button{
    font-size:16px;
    padding:12px 16px;
  }

  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  table{
    background:transparent;
    box-shadow:none;
  }

  tr{
    background:white;
    margin-bottom:15px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
  }

  td{
    border:none;
    padding:6px 0;
  }

  td:before{
    font-weight:bold;
    display:block;
    margin-bottom:2px;
    color:#333;
  }

  td:nth-child(1):before{content:"Name";}
  td:nth-child(2):before{content:"Meter";}
}
</style>
</head>

<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Login Fun Facts</h2>
    <div class="login-info">Bitte mit E-Mail und Passwort anmelden</div>
    <input id="loginEmail" type="email" placeholder="E-Mail" maxlength="120" autocomplete="username">
    <input id="loginPassword" type="password" placeholder="Passwort" maxlength="120" autocomplete="current-password">
    <button onclick="login()">Login</button>
    <p id="loginError" class="login-error">Login fehlgeschlagen. Bitte Daten prüfen.</p>
  </div>
</div>

<div id="appContent" style="display:none;">

  <div class="header">
    <h1>Fun Facts</h1>

    <div class="menu-wrap">
      <button class="menu-button" onclick="toggleMenu(event)">☰</button>
      <div id="dropdownMenu" class="dropdown-menu">
        <button onclick="goToKabellager()">Zum Kabellager</button>
        <button onclick="goToBaustellenmaterial()">Zum Baustellenmaterial</button>
        <button onclick="goToLogs()">Logs</button>
        <button class="logout-safe" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="filter-grid">
      <div>
        <label for="yearFilter">Jahr auswählen</label>
        <select id="yearFilter" onchange="renderStats()"></select>
      </div>

      <div class="info-box" id="resultInfo"></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-title">Gesamthaft eingezogen</div>
      <div class="stat-value" id="totalMeters">0 m</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Anzahl Rückgaben mit Verbrauch</div>
      <div class="stat-value" id="returnCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Durchschnitt pro Rückgabe</div>
      <div class="stat-value" id="avgMeters">0 m</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Grösste Einzelmenge</div>
      <div class="stat-value" id="maxMeters">0 m</div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">Top Baustellen</div>
    <div id="baustellenTableWrap"></div>
  </div>

  <div class="panel">
    <div class="section-title">Top Kabeltypen</div>
    <div id="typenTableWrap"></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
  authDomain: "netzbau-tafers.firebaseapp.com",
  projectId: "netzbau-tafers",
  storageBucket: "netzbau-tafers.appspot.com",
  messagingSenderId: "389541837675",
  appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
  measurementId: "G-B5MJGD3108"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const kabelNutzungCollection = db.collection("kabel_nutzung");

let alleNutzungen = [];
let unsubscribeNutzung = null;

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function toggleMenu(event){
  if(event){
    event.stopPropagation();
  }

  const menu = document.getElementById("dropdownMenu");
  if(menu){
    menu.classList.toggle("open");
  }
}

function closeMenu(){
  const menu = document.getElementById("dropdownMenu");
  if(menu){
    menu.classList.remove("open");
  }
}

function goToKabellager(){
  closeMenu();
  window.location.href = "index.html";
}

function goToBaustellenmaterial(){
  closeMenu();
  window.location.href = "baustellen.html";
}

function goToLogs(){
  closeMenu();
  window.location.href = "logs.html";
}

document.addEventListener("click", function(event){
  const menuWrap = document.querySelector(".menu-wrap");
  if(menuWrap && !menuWrap.contains(event.target)){
    closeMenu();
  }
});

function login(){
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("loginError").style.display = "none";
      document.getElementById("loginPassword").value = "";
    })
    .catch(() => {
      document.getElementById("loginError").style.display = "block";
    });
}

function logout(){
  closeMenu();

  if(!confirm("Wirklich ausloggen?")){
    return;
  }

  stopListeners();

  auth.signOut().catch(() => {
    alert("Fehler beim Logout.");
  });
}

function stopListeners(){
  if(unsubscribeNutzung){
    unsubscribeNutzung();
    unsubscribeNutzung = null;
  }
}

auth.onAuthStateChanged((user) => {
  if(user){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    startListener();
  }else{
    stopListeners();
    closeMenu();
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("appContent").style.display = "none";
    alleNutzungen = [];
  }
});

function getTimeValue(value){
  if(!value){
    return 0;
  }

  if(typeof value.toMillis === "function"){
    return value.toMillis();
  }

  if(value.seconds){
    return value.seconds * 1000;
  }

  const time = new Date(value).getTime();
  return Number.isNaN(time) ? 0 : time;
}

function getYearFromValue(value){
  const time = getTimeValue(value);
  if(!time){
    return null;
  }

  return new Date(time).getFullYear();
}

function startListener(){
  if(unsubscribeNutzung){
    return;
  }

  unsubscribeNutzung = kabelNutzungCollection.onSnapshot(snapshot => {
    alleNutzungen = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    fillYearFilter();
    renderStats();
  }, error => {
    console.error("Fehler Kabelnutzung:", error);
    alert("Fehler beim Laden der Fun Facts.");
  });
}

function fillYearFilter(){
  const select = document.getElementById("yearFilter");
  const currentValue = select.value;

  const years = [...new Set(
    alleNutzungen
      .map(item => getYearFromValue(item.returnAt || item.createdAt))
      .filter(year => year !== null)
  )].sort((a, b) => b - a);

  if(years.length === 0){
    const thisYear = new Date().getFullYear();
    years.push(thisYear);
  }

  select.innerHTML = "";

  years.forEach(year => {
    const option = document.createElement("option");
    option.value = String(year);
    option.textContent = String(year);
    select.appendChild(option);
  });

  if(years.includes(Number(currentValue))){
    select.value = currentValue;
  }else{
    select.value = String(years[0]);
  }
}

function renderStats(){
  const selectedYear = Number(document.getElementById("yearFilter").value);

  const yearData = alleNutzungen.filter(item => {
    const year = getYearFromValue(item.returnAt || item.createdAt);
    return year === selectedYear;
  });

  const totalMetersNumber = yearData.reduce((sum, item) => sum + Number(item.usedMeters || 0), 0);
  const returnCount = yearData.length;
  const avgMetersNumber = returnCount > 0 ? totalMetersNumber / returnCount : 0;
  const maxMetersNumber = yearData.reduce((max, item) => Math.max(max, Number(item.usedMeters || 0)), 0);

  document.getElementById("totalMeters").innerText = formatMeters(totalMetersNumber);
  document.getElementById("returnCount").innerText = String(returnCount);
  document.getElementById("avgMeters").innerText = formatMeters(avgMetersNumber);
  document.getElementById("maxMeters").innerText = formatMeters(maxMetersNumber);

  document.getElementById("resultInfo").innerText =
    "Auswertung für " + selectedYear + ". Gezählt werden nur Rückgaben mit effektiv verbrauchten Metern.";

  renderTopTable(
    "baustellenTableWrap",
    aggregateByField(yearData, "baustelle"),
    "Baustelle"
  );

  renderTopTable(
    "typenTableWrap",
    aggregateByField(yearData, "typ"),
    "Kabeltyp"
  );
}

function aggregateByField(data, fieldName){
  const map = {};

  data.forEach(item => {
    const key = String(item[fieldName] || "Unbekannt").trim() || "Unbekannt";
    const usedMeters = Number(item.usedMeters || 0);

    if(!map[key]){
      map[key] = 0;
    }

    map[key] += usedMeters;
  });

  return Object.entries(map)
    .map(([name, meters]) => ({ name, meters }))
    .sort((a, b) => b.meters - a.meters);
}

function renderTopTable(containerId, rows, firstHeader){
  const container = document.getElementById(containerId);

  if(rows.length === 0){
    container.innerHTML = '<div class="empty-box">Noch keine passenden Daten vorhanden.</div>';
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>${escapeHtml(firstHeader)}</th>
          <th>Meter</th>
        </tr>
      </thead>
      <tbody>
  `;

  rows.forEach(row => {
    html += `
      <tr>
        <td>${escapeHtml(row.name)}</td>
        <td>${escapeHtml(formatMeters(row.meters))}</td>
      </tr>
    `;
  });

  html += `
      </tbody>
    </table>
  `;

  container.innerHTML = html;
}

function formatMeters(value){
  const rounded = Math.round(Number(value || 0) * 100) / 100;
  return rounded.toLocaleString("de-CH") + " m";
}
</script>

</body>
</html>
