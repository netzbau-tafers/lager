<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Baustellen</title>
    <style>
        .collapsible {
            background-color: #777;
            color: white;
            cursor: pointer;
            padding: 10px;
            width: 100%;
            border: none;
            text-align: left;
            outline: none;
            font-size: 15px;
        }
        .active, .collapsible:hover {
            background-color: #555;
        }
        .content {
            padding: 0 18px;
            display: none;
            overflow: hidden;
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <h1>Baustellenverwaltung</h1>
    <button class="collapsible">Aktive Baustellen</button>
    <div class="content">
        <!-- Active construction sites will be listed here -->
        <div class="construction-site"><h2>Bauvorhaben 1</h2>
            <button class="collapsible">Materialliste</button>
            <div class="content">
                <!-- Materials for Bauvorhaben 1 -->
                <p>Material 1, Material 2, Material 3</p>
            </div>
        </div>
        <div class="construction-site"><h2>Bauvorhaben 2</h2>
            <button class="collapsible">Materialliste</button>
            <div class="content">
                <!-- Materials for Bauvorhaben 2 -->
                <p>Material 1, Material 2</p>
            </div>
        </div>
    </div>

    <button class="collapsible">Beendete Baustellen</button>
    <div class="content">
        <!-- Completed construction sites will be listed here -->
        <div class="construction-site"><h2>Bauvorhaben A</h2>
            <button class="collapsible">Materialliste</button>
            <div class="content">
                <!-- Materials for Bauvorhaben A -->
                <p>Material X, Material Y</p>
            </div>
        </div>
    </div>

    <script>
        var coll = document.getElementsByClassName("collapsible");
        for (var i = 0; i < coll.length; i++) {
            coll[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var content = this.nextElementSibling;
                if (content.style.display === "block") {
                    content.style.display = "none";
                } else {
                    content.style.display = "block";
                }
            });
        }
    </script>
</body>
</html>
