<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startseite | Lagermanager</title>

<link rel="icon" type="image/png" sizes="48x48" href="favicon.png">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Arial, sans-serif;
  background:#e6eaef;
  margin:40px;
  color:#222;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  gap:15px;
}

.header h1{
  margin:0;
}

.menu-wrap{
  position:relative;
}

.menu-button{
  background:#555;
  color:white;
  border:none;
  border-radius:10px;
  padding:11px 15px;
  font-size:20px;
  line-height:1;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:48px;
  min-height:44px;
  box-shadow:0 2px 6px rgba(0,0,0,0.10);
}

.menu-button:hover{
  background:#333;
}

.dropdown-menu{
  display:none;
  position:absolute;
  top:52px;
  right:0;
  min-width:220px;
  background:white;
  border:1px solid #ccc;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
  padding:8px;
  z-index:3000;
}

.dropdown-menu.open{
  display:block;
}

.active-page{
  background:#e0e0e0 !important;
  color:#333 !important;
  cursor:default;
}

button{
  padding:10px 14px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#3498db;
  color:white;
  margin:2px;
  font-size:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

button:hover{
  background:#2980b9;
}

.dropdown-menu button{
  width:100%;
  text-align:left;
  margin:0 0 8px 0;
}

.dropdown-menu button:last-child{
  margin-bottom:0;
}

.logout-safe{
  background:#777;
}

.logout-safe:hover{
  background:#555;
}

.login-screen{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:80vh;
}

.login-card{
  background:white;
  border:1px solid #d7dce2;
  border-radius:14px;
  width:360px;
  max-width:92%;
  padding:22px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
}

.login-card h2{
  margin-top:0;
  text-align:center;
}

.login-card input{
  width:100%;
  padding:10px;
  margin:6px 0 10px 0;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

.login-error{
  color:#c0392b;
  display:none;
  margin-top:10px;
  text-align:center;
}

.login-info{
  color:#555;
  font-size:14px;
  text-align:center;
  margin-bottom:15px;
}

.hero{
  max-width:1100px;
  margin:0 auto;
  background:white;
  border:1px solid #d5dbe3;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  overflow:hidden;
}

.hero-actions{
  display:flex;
  gap:12px;
  padding:16px;
  justify-content:center;
  background:#f5f7fa;
  border-bottom:1px solid #e1e6ed;
  flex-wrap:wrap;
}

.hero-link{
  text-decoration:none;
}

.hero-image{
  width:100%;
  height:auto;
  display:block;
}

@media (max-width: 680px){
  body{
    margin:18px;
  }

  .hero-actions{
    flex-direction:column;
    align-items:stretch;
  }

  .hero-actions button{
    width:100%;
  }
}
</style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h2>Login Startseite</h2>
      <div class="login-info">Bitte mit E-Mail und Passwort anmelden</div>
      <input id="loginEmail" type="email" placeholder="E-Mail" maxlength="120" autocomplete="username">
      <input id="loginPassword" type="password" placeholder="Passwort" maxlength="120" autocomplete="current-password">
      <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
      <p id="loginError" class="login-error">Login fehlgeschlagen. Bitte Daten prüfen.</p>
    </div>
  </div>

  <div id="appContent" style="display:none;">
  <div class="header">
    <h1>Startseite</h1>

    <div class="menu-wrap">
      <button class="menu-button" onclick="toggleMenu(event)" title="Menü öffnen">
        <i class="fa-solid fa-bars"></i>
      </button>

      <div id="dropdownMenu" class="dropdown-menu">
        <button onclick="closeMenu()" data-page="home">
          <i class="fa-solid fa-house"></i> Startseite
        </button>

        <button onclick="goToKabellager()" data-page="index">
          <i class="fa-solid fa-warehouse"></i> Kabellager
        </button>

        <button onclick="goToBaustellen()" data-page="baustellen">
          <i class="fa-solid fa-screwdriver-wrench"></i> Baustellenmaterial
        </button>

        <button onclick="goToArchiv()" data-page="archiv">
          <i class="fa-solid fa-box-archive"></i> Archiv
        </button>

        <button onclick="goToLogs()" data-page="logs">
          <i class="fa-solid fa-clipboard-list"></i> Logs
        </button>

        <button class="logout-safe" onclick="logout()">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </div>

  <section class="hero">
    <div class="hero-actions">
      <a href="index.html" class="hero-link">
        <button><i class="fa-solid fa-warehouse"></i> Zum Kabellager</button>
      </a>
      <a href="baustellen.html" class="hero-link">
        <button><i class="fa-solid fa-screwdriver-wrench"></i> Zu Baustellenmaterial</button>
      </a>
    </div>

    <img src="ChatGPT Image 10. März 2026, 21_46_18.png" alt="Startseitenbild" class="hero-image">
  </section>
  </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
  authDomain: "netzbau-tafers.firebaseapp.com",
  projectId: "netzbau-tafers",
  storageBucket: "netzbau-tafers.appspot.com",
  messagingSenderId: "389541837675",
  appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
  measurementId: "G-B5MJGD3108"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function toggleMenu(event){
  event.stopPropagation();
  const menu = document.getElementById("dropdownMenu");
  menu.classList.toggle("open");
}

function closeMenu(){
  const menu = document.getElementById("dropdownMenu");
  menu.classList.remove("open");
}

function goToKabellager(){
  closeMenu();
  window.location.href = "index.html";
}

function goToBaustellen(){
  closeMenu();
  window.location.href = "baustellen.html";
}

function goToArchiv(){
  closeMenu();
  window.location.href = "archiv.html";
}

function goToLogs(){
  closeMenu();
  window.location.href = "logs.html";
}

function login(){
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("loginError").style.display = "none";
      document.getElementById("loginPassword").value = "";
    })
    .catch((error) => {
      console.error("Login Fehler:", error);
      document.getElementById("loginError").style.display = "block";
    });
}

function logout(){
  closeMenu();

  if(!confirm("Wirklich ausloggen?")){
    return;
  }

  auth.signOut().catch((error) => {
    console.error("Logout Fehler:", error);
    alert("Fehler beim Logout.");
  });
}

function markActiveMenu(){
  const buttons = document.querySelectorAll("#dropdownMenu button");
  buttons.forEach(btn => {
    const page = btn.getAttribute("data-page");
    if(page === "home"){
      btn.classList.add("active-page");
    }
  });
}

document.addEventListener("click", (event) => {
  const menu = document.getElementById("dropdownMenu");
  const wrap = document.querySelector(".menu-wrap");

  if(menu.classList.contains("open") && !wrap.contains(event.target)){
    closeMenu();
  }
});

document.addEventListener("DOMContentLoaded", markActiveMenu);

auth.onAuthStateChanged((user) => {
  if(user){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appContent").style.display = "block";
  }else{
    closeMenu();
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("appContent").style.display = "none";
  }
});
</script>
</body>
</html>
