<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strommast-Spiel</title>

<link rel="icon" type="image/png" sizes="48x48" href="favicon.png">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#e6eaef;
  color:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.game-wrap{
  width:min(1000px, 95vw);
  background:white;
  border:1px solid #d5dbe3;
  border-radius:16px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  overflow:hidden;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  background:#f5f7fa;
  border-bottom:1px solid #e1e6ed;
  flex-wrap:wrap;
}

.topbar-left{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:22px;
}

button{
  padding:10px 14px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#3498db;
  color:white;
  font-size:14px;
}

button:hover{
  background:#2980b9;
}

.score{
  font-weight:bold;
  font-size:16px;
}

.canvas-wrap{
  position:relative;
  background:linear-gradient(to bottom, #f9fbfd 0%, #eef3f7 100%);
}

canvas{
  display:block;
  width:100%;
  height:auto;
  background:transparent;
  touch-action:manipulation;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.0);
  pointer-events:none;
}

.overlay-box{
  background:rgba(255,255,255,0.92);
  border:1px solid #d7dce2;
  border-radius:14px;
  padding:18px 22px;
  text-align:center;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  pointer-events:auto;
}

.overlay-box h2{
  margin-top:0;
  margin-bottom:10px;
}

.overlay-box p{
  margin:6px 0;
}

.hidden{
  display:none;
}

.info{
  padding:12px 16px 18px 16px;
  color:#555;
  font-size:14px;
}

@media (max-width: 700px){
  h1{
    font-size:18px;
  }

  .topbar{
    flex-direction:column;
    align-items:stretch;
  }

  .topbar-left{
    justify-content:space-between;
  }
}
</style>
</head>
<body>
  <div class="game-wrap">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Strommast-Spiel</h1>
        <button onclick="window.location.href='home.html'">Zurück</button>
        <button onclick="startGame()">Neu starten</button>
      </div>
      <div class="score">
        Punkte: <span id="score">0</span> | Rekord: <span id="bestScore">0</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="1000" height="320"></canvas>

      <div id="startOverlay" class="overlay">
        <div class="overlay-box">
          <h2>Start</h2>
          <p>Drücke Leertaste, Pfeil hoch, Mausklick oder tippe aufs Feld.</p>
          <p>Der Mann springt über Strommasten.</p>
          <button onclick="startGame()">Spiel starten</button>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-box">
          <h2>Game Over</h2>
          <p>Du bist in einen Strommast gelaufen.</p>
          <p>Punkte: <span id="finalScore">0</span></p>
          <button onclick="startGame()">Nochmal spielen</button>
        </div>
      </div>
    </div>

    <div class="info">
      Bedienung wie beim T-Rex-Spiel: Springen mit Leertaste, Pfeil hoch, Klick oder Touch.
    </div>
  </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const bestScoreEl = document.getElementById("bestScore");
const finalScoreEl = document.getElementById("finalScore");
const startOverlay = document.getElementById("startOverlay");
const gameOverOverlay = document.getElementById("gameOverOverlay");

let animationId = null;
let gameRunning = false;
let gameSpeed = 6;
let gravity = 0.75;
let score = 0;
let bestScore = Number(localStorage.getItem("strommastBestScore") || 0);
bestScoreEl.textContent = bestScore;

const groundY = 250;

const player = {
  x: 90,
  y: groundY,
  width: 34,
  height: 54,
  vy: 0,
  jumpPower: -13.5,
  grounded: true
};

let obstacles = [];
let particles = [];
let spawnTimer = 0;

function resetGameState(){
  gameRunning = true;
  gameSpeed = 6;
  gravity = 0.75;
  score = 0;
  spawnTimer = 0;
  obstacles = [];
  particles = [];
  player.y = groundY;
  player.vy = 0;
  player.grounded = true;
  scoreEl.textContent = "0";
  startOverlay.classList.add("hidden");
  gameOverOverlay.classList.add("hidden");
}

function startGame(){
  cancelAnimationFrame(animationId);
  resetGameState();
  loop();
}

function jump(){
  if(!gameRunning) return;

  if(player.grounded){
    player.vy = player.jumpPower;
    player.grounded = false;
  }
}

function endGame(){
  gameRunning = false;
  finalScoreEl.textContent = Math.floor(score);

  if(score > bestScore){
    bestScore = Math.floor(score);
    localStorage.setItem("strommastBestScore", bestScore);
    bestScoreEl.textContent = bestScore;
  }

  gameOverOverlay.classList.remove("hidden");
}

function createObstacle(){
  const width = 28 + Math.random() * 12;
  const height = 75 + Math.random() * 45;

  obstacles.push({
    x: canvas.width + 20,
    y: groundY + 54 - height,
    width,
    height
  });
}

function update(){
  player.vy += gravity;
  player.y += player.vy;

  if(player.y >= groundY){
    player.y = groundY;
    player.vy = 0;
    player.grounded = true;
  }

  spawnTimer++;
  if(spawnTimer > 85 + Math.random() * 40){
    createObstacle();
    spawnTimer = 0;
  }

  for(let i = obstacles.length - 1; i >= 0; i--){
    obstacles[i].x -= gameSpeed;

    if(obstacles[i].x + obstacles[i].width < 0){
      obstacles.splice(i, 1);
      score += 1;
      scoreEl.textContent = Math.floor(score);

      if(score % 10 === 0){
        gameSpeed += 0.4;
      }
    }
  }

  const playerHitbox = {
    x: player.x + 5,
    y: player.y + 4,
    width: player.width - 10,
    height: player.height - 4
  };

  for(const ob of obstacles){
    const hit =
      playerHitbox.x < ob.x + ob.width &&
      playerHitbox.x + playerHitbox.width > ob.x &&
      playerHitbox.y < ob.y + ob.height &&
      playerHitbox.y + playerHitbox.height > ob.y;

    if(hit){
      endGame();
      return;
    }
  }
}

function drawGround(){
  ctx.strokeStyle = "#9aa7b5";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY + player.height);
  ctx.lineTo(canvas.width, groundY + player.height);
  ctx.stroke();

  for(let i = 0; i < canvas.width; i += 40){
    ctx.beginPath();
    ctx.moveTo(i, groundY + player.height + 8);
    ctx.lineTo(i + 20, groundY + player.height + 8);
    ctx.strokeStyle = "#c8d0d8";
    ctx.stroke();
  }
}

function drawPlayer(){
  const x = player.x;
  const y = player.y;

  ctx.fillStyle = "#1f2d3a";

  ctx.beginPath();
  ctx.arc(x + 17, y + 10, 9, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillRect(x + 12, y + 20, 10, 18);
  ctx.fillRect(x + 6, y + 22, 7, 6);
  ctx.fillRect(x + 21, y + 22, 7, 6);

  ctx.fillRect(x + 11, y + 38, 6, 16);
  ctx.fillRect(x + 19, y + 38, 6, 16);

  if(!player.grounded){
    ctx.fillRect(x + 3, y + 24, 9, 4);
    ctx.fillRect(x + 22, y + 18, 9, 4);
  }
}

function drawObstacle(ob){
  const x = ob.x;
  const y = ob.y;
  const h = ob.height;
  const w = ob.width;

  ctx.fillStyle = "#7f8c8d";
  ctx.fillRect(x + w/2 - 4, y, 8, h);

  ctx.fillStyle = "#95a5a6";
  ctx.fillRect(x - 8, y + 12, w + 16, 5);
  ctx.fillRect(x - 6, y + 28, w + 12, 4);

  ctx.strokeStyle = "#6c7a7b";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + w/2, y + 17);
  ctx.lineTo(x + w/2 - 12, y + 34);
  ctx.moveTo(x + w/2, y + 17);
  ctx.lineTo(x + w/2 + 12, y + 34);
  ctx.stroke();
}

function drawBackground(){
  ctx.fillStyle = "#dfe8f0";
  for(let i = 0; i < 5; i++){
    const cx = (i * 220 + 80 - (score * 1.2) % 220);
    const cy = 55 + (i % 2) * 20;

    ctx.beginPath();
    ctx.arc(cx, cy, 18, Math.PI * 0.5, Math.PI * 1.5);
    ctx.arc(cx + 20, cy - 10, 18, Math.PI, Math.PI * 1.85);
    ctx.arc(cx + 42, cy, 18, Math.PI * 1.37, Math.PI * 0.37);
    ctx.closePath();
    ctx.fill();
  }
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawGround();
  drawPlayer();

  for(const ob of obstacles){
    drawObstacle(ob);
  }
}

function loop(){
  if(gameRunning){
    update();
    draw();
    animationId = requestAnimationFrame(loop);
  }else{
    draw();
  }
}

document.addEventListener("keydown", (e) => {
  if(
    e.code === "Space" ||
    e.code === "ArrowUp"
  ){
    e.preventDefault();

    if(!gameRunning && startOverlay.classList.contains("hidden") && !gameOverOverlay.classList.contains("hidden")){
      startGame();
      return;
    }

    if(!startOverlay.classList.contains("hidden")){
      startGame();
      return;
    }

    jump();
  }
});

canvas.addEventListener("click", () => {
  if(!startOverlay.classList.contains("hidden")){
    startGame();
    return;
  }

  if(gameRunning){
    jump();
  }
});

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();

  if(!startOverlay.classList.contains("hidden")){
    startGame();
    return;
  }

  if(gameRunning){
    jump();
  }
}, { passive:false });

draw();
</script>
</body>
</html>
