<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="screen-orientation" content="landscape">
<title>Mast Runner</title>

<link rel="icon" type="image/png" sizes="48x48" href="favicon.png">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --bg-1:#f8fbff;
  --bg-2:#e6edf6;
  --bg-3:#dfe7f1;
  --card:#ffffff;
  --card-soft:#f7f9fb;
  --border:#d5dbe3;
  --border-soft:#e1e6ed;
  --text:#222;
  --text-soft:#35506b;
  --primary-1:#44a7ea;
  --primary-2:#2689cc;
  --primary-3:#1f77b5;
  --pill-bg:#eef6ff;
  --pill-border:#c8d9eb;
  --pill-text:#27517a;
  --shadow:0 12px 30px rgba(33,50,74,0.15);
  --radius:18px;
}

*{
  box-sizing:border-box;
}

html, body{
  width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at 20% 10%, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:18px;
}

.game-wrap{
  width:min(1100px, 98vw);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  padding:16px 18px;
  background:#f5f7fa;
  border-bottom:1px solid var(--border-soft);
  flex-wrap:wrap;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  min-width:0;
}

.topbar-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:28px;
  line-height:1.1;
  color:#1e2d3d;
}

button{
  padding:11px 16px;
  cursor:pointer;
  border:none;
  border-radius:12px;
  background:linear-gradient(180deg, var(--primary-1), var(--primary-2));
  color:white;
  font-size:14px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(38,137,204,0.18);
  transition:transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, opacity 0.15s ease;
}

button:hover{
  background:linear-gradient(180deg, #2f9de7, var(--primary-3));
  transform:translateY(-1px);
  box-shadow:0 6px 12px rgba(38,137,204,0.24);
}

button:active{
  transform:translateY(0);
}

.score{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  font-weight:bold;
  font-size:16px;
}

.canvas-wrap{
  position:relative;
  background:linear-gradient(to bottom, #edf6ff 0%, #dbe9f7 55%, #d6e6f5 78%, #d4e3f2 100%);
  overflow:hidden;
}

canvas{
  display:block;
  width:100%;
  height:auto;
  background:transparent;
  touch-action:manipulation;
  aspect-ratio:1000 / 320;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  background:rgba(255,255,255,0.08);
  z-index:10;
}

.overlay-box{
  background:rgba(255,255,255,0.96);
  border:1px solid #d7dce2;
  border-radius:18px;
  padding:22px 24px;
  text-align:center;
  box-shadow:0 10px 28px rgba(0,0,0,0.09);
  width:min(460px, calc(100vw - 32px));
  max-height:min(86vh, 700px);
  overflow:auto;
}

.overlay-box h2{
  margin:0 0 10px 0;
  font-size:24px;
  color:#1f2d3a;
}

.overlay-box p{
  margin:8px 0;
  line-height:1.4;
}

.hidden{
  display:none !important;
}

.character-select{
  display:flex;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
  padding:18px 16px 6px 16px;
}

.character-label{
  font-weight:bold;
  color:#1f476f;
  min-width:92px;
  padding-top:10px;
}

.character-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  flex:1;
}

.character-button{
  border:1px solid #bfd4ea;
  background:#eff6ff;
  color:#1f476f;
  box-shadow:none;
}

.character-button.active{
  border-color:#2c8fd2;
  background:linear-gradient(180deg, #44a7ea, #2689cc);
  color:white;
  box-shadow:0 4px 10px rgba(38,137,204,0.18);
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--pill-border);
  background:var(--pill-bg);
  color:var(--pill-text);
  font-size:14px;
  font-weight:bold;
}

.name-input{
  width:100%;
  box-sizing:border-box;
  padding:13px 14px;
  border:1px solid #cfd6df;
  border-radius:12px;
  margin:14px 0 10px 0;
  font-size:16px;
  outline:none;
}

.name-input:focus{
  border-color:#67aee2;
  box-shadow:0 0 0 3px rgba(68,167,234,0.12);
}

.overlay-actions{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.live-ranking{
  margin:12px 16px 18px;
  background:var(--card-soft);
  border:1px solid #dbe3ec;
  border-radius:14px;
  padding:14px 16px;
}

.live-ranking h3{
  margin:0 0 10px 0;
  color:#1f476f;
  font-size:20px;
}

.live-ranking ol{
  margin:0;
  padding-left:26px;
}

.live-ranking li{
  margin:6px 0;
  line-height:1.45;
  word-break:break-word;
}

.character-hint{
  margin:2px 16px 14px 16px;
  color:#8b2b2b;
  font-size:14px;
  font-weight:bold;
  width:100%;
}

.hidden-message{
  visibility:hidden;
}

.fs-btn{
  position:absolute;
  z-index:22;
  width:52px;
  height:52px;
  border-radius:14px;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:22px;
  padding:0;
  background:linear-gradient(180deg, rgba(68,167,234,0.96), rgba(38,137,204,0.96));
  box-shadow:0 8px 18px rgba(33,50,74,0.25);
}

.fs-btn svg{
  width:24px;
  height:24px;
  fill:white;
}

.game-wrap:fullscreen .fs-btn,
.game-wrap:-webkit-full-screen .fs-btn,
.game-wrap:-ms-fullscreen .fs-btn{
  display:flex;
}

.fullscreen-btn{
  right:12px;
  bottom:12px;
}

.exit-fullscreen-btn{
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:linear-gradient(180deg, rgba(64,108,148,0.96), rgba(44,85,122,0.96));
}

.exit-fullscreen-btn:hover{
  transform:translateY(calc(-50% - 1px));
}

@media (max-width: 900px){
  body{
    padding:10px;
    align-items:flex-start;
  }

  .game-wrap{
    width:100%;
  }

  h1{
    font-size:24px;
  }

  .overlay-box{
    width:min(500px, calc(100vw - 24px));
  }
}

@media (max-width: 700px){
  body{
    padding:0;
    align-items:flex-start;
    background:#eef3f8;
  }

  .game-wrap{
    width:100vw;
    min-height:100vh;
    border-radius:0;
    border:none;
    box-shadow:none;
  }

  .topbar{
    padding:14px 14px 12px 14px;
    gap:12px;
    align-items:stretch;
  }

  .topbar-left{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .topbar-left h1{
    grid-column:1 / -1;
    font-size:18px;
    line-height:1.2;
    margin-bottom:2px;
  }

  .topbar-left button{
    width:100%;
    min-height:48px;
    font-size:15px;
    border-radius:14px;
  }

  .topbar-right,
  .score{
    width:100%;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .pill{
    flex:1 1 calc(50% - 8px);
    justify-content:center;
    min-height:42px;
    font-size:15px;
  }

  canvas{
    width:100%;
    height:auto;
    aspect-ratio:1000 / 320;
    min-height:200px;
  }

  .overlay{
    align-items:flex-start;
    padding:14px;
    overflow:auto;
  }

  .overlay-box{
    width:100%;
    max-width:none;
    padding:20px 16px;
    border-radius:20px;
    margin-top:10px;
    max-height:none;
  }

  .overlay-box h2{
    font-size:30px;
    margin-bottom:12px;
  }

  .overlay-box p{
    font-size:18px;
  }

  .name-input{
    font-size:18px;
    padding:14px 14px;
    border-radius:14px;
  }

  .overlay-actions{
    flex-direction:column;
    gap:12px;
  }

  .overlay-actions button{
    width:100%;
    min-height:52px;
    font-size:16px;
    border-radius:14px;
  }

  .character-select{
    padding:16px 14px 6px 14px;
    gap:8px;
  }

  .character-label{
    min-width:100%;
    padding-top:0;
    font-size:18px;
  }

  .character-buttons{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .character-button{
    width:100%;
    min-height:54px;
    font-size:15px;
    border-radius:14px;
  }

  .character-hint{
    margin:4px 14px 10px 14px;
    font-size:14px;
  }

  .live-ranking{
    margin:12px 14px 18px 14px;
    padding:14px;
    border-radius:16px;
  }

  .live-ranking h3{
    font-size:18px;
    line-height:1.25;
  }

  .live-ranking li{
    font-size:16px;
  }

  .fs-btn{
    display:flex;
  }

  .fullscreen-btn{
    right:14px;
    bottom:14px;
  }
}

@media (max-width: 430px){
  .character-buttons{
    grid-template-columns:1fr;
  }

  .pill{
    flex:1 1 100%;
  }
}
</style>
</head>
<body>
  <div class="game-wrap" id="gameWrap">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Mast Runner</h1>
        <button type="button" onclick="window.location.href='home.html'">Zurück</button>
        <button type="button" onclick="startGame()">Start</button>
      </div>

      <div class="topbar-right score">
        <span class="pill">Punkte: <span id="score">0</span></span>
        <span class="pill">Rekord: <span id="bestScore">0</span></span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="1000" height="320"></canvas>

      <div id="startOverlay" class="overlay">
        <div class="overlay-box">
          <h2>Start</h2>
          <p>Wähle ein Charakter und drücke Start.</p>
          <button type="button" onclick="startGame()">Spiel starten</button>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-box">
          <h2>Game Over</h2>
          <p>Punkte: <span id="finalScore">0</span></p>
          <p id="saveStatus"></p>

          <div class="overlay-actions">
            <button id="saveScoreButton" type="button" onclick="saveScore()">Punkte speichern</button>
            <button id="newGameButton" type="button" onclick="startGame()">Neues Spiel</button>
          </div>
        </div>
      </div>

      <button id="fullscreenBtn" class="fs-btn fullscreen-btn" type="button" aria-label="Vollbild">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 3H3v4h2V5h2V3zm14 0h-4v2h2v2h2V3zM5 17H3v4h4v-2H5v-2zm16 0h-2v2h-2v2h4v-4z"/>
        </svg>
      </button>

      <button id="exitFullscreenBtn" class="fs-btn exit-fullscreen-btn hidden" type="button" aria-label="Normalansicht">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 9H3V7h4V3h2v6zm12 0h-6V3h2v4h4v2zM9 21H7v-4H3v-2h6v6zm12-2v2h-6v-6h2v4h4z"/>
        </svg>
      </button>
    </div>

    <div class="character-select">
      <span class="character-label">Charakter:</span>

      <div class="character-buttons">
        <button type="button" class="character-button" data-character="worker">👷 Lehrling</button>
        <button type="button" class="character-button" data-character="frog">🐸 Santivastler</button>
        <button type="button" class="character-button" data-character="donkey">🫏 Düdinger</button>
        <button type="button" class="character-button" data-character="unimog">🚛 Unimog</button>
        <button type="button" class="character-button" data-character="sprinter">🚐 Käta</button>
        <button type="button" class="character-button" data-character="chef">👑 Chef</button>
        <button type="button" class="character-button" data-character="buezer">💪 Büezer</button>
      </div>

      <p id="characterHint" class="character-hint hidden-message">Bitte zuerst einen Charakter auswählen.</p>
    </div>

    <div class="live-ranking">
      <h3>Live-Bestenliste (Top 20)</h3>
      <ol id="liveRankingList"></ol>
    </div>
  </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const gameWrap = document.getElementById("gameWrap");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const exitFullscreenBtn = document.getElementById("exitFullscreenBtn");

const scoreEl = document.getElementById("score");
const bestScoreEl = document.getElementById("bestScore");
const finalScoreEl = document.getElementById("finalScore");
const startOverlay = document.getElementById("startOverlay");
const gameOverOverlay = document.getElementById("gameOverOverlay");
const saveStatusEl = document.getElementById("saveStatus");
const saveScoreButton = document.getElementById("saveScoreButton");
const newGameButton = document.getElementById("newGameButton");
const liveRankingList = document.getElementById("liveRankingList");
const characterButtons = document.querySelectorAll(".character-button");
const characterHint = document.getElementById("characterHint");

let animationId = null;
let gameRunning = false;
let gameSpeed = 2.35;
let gravity = 0.47;
let score = 0;
let frameCount = 0;
let bestScore = Number(localStorage.getItem("strommastBestScore") || 0);
bestScoreEl.textContent = bestScore;

const firebaseConfig = {
  apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
  authDomain: "netzbau-tafers.firebaseapp.com",
  projectId: "netzbau-tafers",
  storageBucket: "netzbau-tafers.appspot.com",
  messagingSenderId: "389541837675",
  appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
  measurementId: "G-B5MJGD3108"
};

const firebaseApp = firebase.apps.length
  ? firebase.app()
  : firebase.initializeApp(firebaseConfig);
const db = firebaseApp.firestore();
const auth = firebaseApp.auth();

const RANKING_KEY = "strommastRanking";
const SCORE_COLLECTION = "strommastRanking";
const RANKING_LIMIT = 20;
const groundY = 250;
let cloudRanking = [];

const player = {
  x: 90,
  y: groundY,
  width: 36,
  height: 56,
  vy: 0,
  jumpPower: -11.1,
  grounded: true,
  jumpHoldTime: 0,
  jumpHolding: false,
  maxJumpHoldTime: 15,
  jumpsUsed: 0,
  coyoteTime: 0
};

let obstacles = [];
let spawnTimer = 0;
let gameOverSaved = false;
let selectedCharacter = null;

const obstacleTypes = ["mast", "wind", "solar", "tree", "house"];

function loadRanking(){
  try{
    return JSON.parse(localStorage.getItem(RANKING_KEY) || "[]");
  }catch(error){
    return [];
  }
}

function saveRankingLocal(ranking){
  localStorage.setItem(RANKING_KEY, JSON.stringify(ranking.slice(0, RANKING_LIMIT)));
}

function sanitizeInput(value, maxLength = 120){
  return String(value || "").replace(/\s+/g, " ").trim().slice(0, maxLength);
}

function getStoredUsername(){
  return sanitizeInput(localStorage.getItem("lagerUsername") || "", 120);
}

function getScoreUsername(){
  const storedUsername = getStoredUsername();
  if(storedUsername){
    return storedUsername;
  }

  const user = auth.currentUser;
  if(user && user.email){
    return sanitizeInput(user.email, 120);
  }

  return "Unbekannt";
}

function getCharacterMeta(character){
  const fallback = { key: "worker", icon: "👷" };
  const characterMap = {
    worker: { key: "worker", icon: "👷" },
    frog: { key: "frog", icon: "🐸" },
    donkey: { key: "donkey", icon: "🫏" },
    unimog: { key: "unimog", icon: "🚛" },
    sprinter: { key: "sprinter", icon: "🚐" },
    chef: { key: "chef", icon: "👑" },
    muskelprotz: { key: "muskelprotz", icon: "💪" },
    buezer: { key: "muskelprotz", icon: "💪" }
  };

  return characterMap[character] || fallback;
}

function normalizeCreatedAt(value){
  if(!value){
    return null;
  }

  if(typeof value.toDate === "function"){
    return value.toDate().getTime();
  }

  if(value instanceof Date){
    return value.getTime();
  }

  if(typeof value === "number"){
    return Number.isFinite(value) ? value : null;
  }

  if(typeof value === "string"){
    const parsed = Date.parse(value);
    return Number.isNaN(parsed) ? null : parsed;
  }

  return null;
}

function formatDateOnly(value){
  const timestamp = normalizeCreatedAt(value);
  if(!timestamp){
    return "";
  }

  return new Intl.DateTimeFormat("de-CH", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  }).format(new Date(timestamp));
}

function renderRanking(){
  const ranking = cloudRanking.length ? cloudRanking : loadRanking();

  const html = ranking.length
    ? ranking.map((entry) => {
      const character = getCharacterMeta(entry.character);
      const dateLabel = formatDateOnly(entry.createdAt);
      const rankingDate = dateLabel ? ` · ${dateLabel}` : "";
      return `<li><strong>${escapeHtml(entry.name)}</strong> - ${entry.score} Punkte ${character.icon}${rankingDate}</li>`;
    }).join("")
    : "<li>Noch keine Einträge</li>";

  liveRankingList.innerHTML = html;
}

async function fetchRankingFromFirestore(){
  try{
    const snapshot = await db.collection(SCORE_COLLECTION)
      .orderBy("score", "desc")
      .orderBy("createdAt", "asc")
      .limit(RANKING_LIMIT)
      .get();

    const ranking = snapshot.docs.map((doc) => {
      const data = doc.data() || {};
      return {
        id: doc.id,
        name: typeof data.name === "string" ? data.name : "Unbekannt",
        score: Number(data.score) || 0,
        character: getCharacterMeta(data.character).key,
        createdAt: normalizeCreatedAt(data.createdAt)
      };
    });

    cloudRanking = ranking;
    saveRankingLocal(ranking);
    renderRanking();
    return ranking;
  }catch(error){
    console.warn("Ranking mit createdAt konnte nicht geladen werden:", error);

    try{
      const fallbackSnapshot = await db.collection(SCORE_COLLECTION)
        .orderBy("score", "desc")
        .limit(RANKING_LIMIT)
        .get();

      const fallbackRanking = fallbackSnapshot.docs.map((doc) => {
        const data = doc.data() || {};
        return {
          id: doc.id,
          name: typeof data.name === "string" ? data.name : "Unbekannt",
          score: Number(data.score) || 0,
          character: getCharacterMeta(data.character).key,
          createdAt: normalizeCreatedAt(data.createdAt)
        };
      });

      cloudRanking = fallbackRanking;
      saveRankingLocal(fallbackRanking);
      renderRanking();
      return fallbackRanking;
    }catch(fallbackError){
      console.error("Firestore Ranking-Update fehlgeschlagen:", fallbackError);
      renderRanking();
      return loadRanking();
    }
  }
}

async function cleanupRanking(){
  try{
    const snapshot = await db.collection(SCORE_COLLECTION)
      .orderBy("score", "desc")
      .orderBy("createdAt", "asc")
      .get();

    const docsToDelete = snapshot.docs.slice(RANKING_LIMIT);
    await Promise.all(docsToDelete.map((doc) => doc.ref.delete()));
  }catch(error){
    console.warn("Ranking-Cleanup mit createdAt fehlgeschlagen:", error);

    try{
      const fallbackSnapshot = await db.collection(SCORE_COLLECTION)
        .orderBy("score", "desc")
        .get();

      const docsToDelete = fallbackSnapshot.docs.slice(RANKING_LIMIT);
      await Promise.all(docsToDelete.map((doc) => doc.ref.delete()));
    }catch(fallbackError){
      console.error("Ranking-Cleanup fehlgeschlagen:", fallbackError);
    }
  }
}

async function saveScore(){
  if(gameOverSaved){
    return;
  }

  const name = getScoreUsername();

  const newEntry = {
    name: name.slice(0, 20),
    score: Math.floor(score),
    character: getCharacterMeta(selectedCharacter).key,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  let saveWorked = false;

  try{
    await db.collection(SCORE_COLLECTION).add(newEntry);
    saveWorked = true;
    console.log("Score erfolgreich in Firestore gespeichert.");
  }catch(error){
    console.error("Firestore speichern fehlgeschlagen:", error);
  }

  let rankingAfterSave = loadRanking();

  if(saveWorked){
    rankingAfterSave = await fetchRankingFromFirestore();
    await cleanupRanking();
    rankingAfterSave = await fetchRankingFromFirestore();
  }else{
    rankingAfterSave.push({
      name: newEntry.name,
      score: newEntry.score,
      character: newEntry.character,
      createdAt: Date.now()
    });
    rankingAfterSave.sort((a, b) => b.score - a.score);
    rankingAfterSave = rankingAfterSave.slice(0, RANKING_LIMIT);
    saveRankingLocal(rankingAfterSave);
  }

  if(score > bestScore){
    bestScore = Math.floor(score);
    localStorage.setItem("strommastBestScore", bestScore);
    bestScoreEl.textContent = bestScore;
  }

  cloudRanking = rankingAfterSave.map(entry => ({
    name: entry.name,
    score: entry.score,
    character: getCharacterMeta(entry.character).key,
    createdAt: normalizeCreatedAt(entry.createdAt)
  }));

  gameOverSaved = true;
  saveStatusEl.textContent = `Punkte wurden für ${name} gespeichert.`;
  saveScoreButton.classList.add("hidden");
  newGameButton.classList.remove("hidden");
  renderRanking();
}

async function lockLandscapeOnMobile(){
  if(!window.matchMedia("(max-width: 700px)").matches){
    return;
  }

  const orientation = screen.orientation;
  if(!orientation || typeof orientation.lock !== "function"){
    return;
  }

  try{
    await orientation.lock("landscape");
  }catch(error){
    console.warn("Landscape-Lock nicht möglich:", error);
  }
}

async function enterFullscreen(){
  const element = gameWrap;
  const request =
    element.requestFullscreen ||
    element.webkitRequestFullscreen ||
    element.msRequestFullscreen;

  if(typeof request === "function"){
    try{
      await request.call(element);
      await lockLandscapeOnMobile();
    }catch(error){
      console.warn("Fullscreen nicht möglich:", error);
    }
  }
}

async function exitFullscreen(){
  const exitFn =
    document.exitFullscreen ||
    document.webkitExitFullscreen ||
    document.msExitFullscreen;

  if(typeof exitFn === "function"){
    try{
      await exitFn.call(document);
    }catch(error){
      console.warn("Fullscreen beenden nicht möglich:", error);
    }
  }
}

function updateFullscreenButtons(){
  const isFs = !!(
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.msFullscreenElement
  );

  if(isFs){
    fullscreenBtn.classList.add("hidden");
    exitFullscreenBtn.classList.remove("hidden");
  }else{
    fullscreenBtn.classList.remove("hidden");
    exitFullscreenBtn.classList.add("hidden");
  }
}

function subscribeRanking(){
  db.collection(SCORE_COLLECTION)
    .orderBy("score", "desc")
    .orderBy("createdAt", "asc")
    .limit(RANKING_LIMIT)
    .onSnapshot((snapshot) => {
      cloudRanking = snapshot.docs.map((doc) => {
        const data = doc.data() || {};
        return {
          id: doc.id,
          name: typeof data.name === "string" ? data.name : "Unbekannt",
          score: Number(data.score) || 0,
          character: getCharacterMeta(data.character).key
        };
      });

      if(cloudRanking.length){
        saveRankingLocal(cloudRanking);
      }

      renderRanking();
    }, async (error) => {
      console.warn("Live-Ranking mit createdAt fehlgeschlagen:", error);

      try{
        const fallbackSnapshot = await db.collection(SCORE_COLLECTION)
          .orderBy("score", "desc")
          .limit(RANKING_LIMIT)
          .get();

        cloudRanking = fallbackSnapshot.docs.map((doc) => {
          const data = doc.data() || {};
          return {
            id: doc.id,
            name: typeof data.name === "string" ? data.name : "Unbekannt",
            score: Number(data.score) || 0,
            character: getCharacterMeta(data.character).key
          };
        });

        if(cloudRanking.length){
          saveRankingLocal(cloudRanking);
        }

        renderRanking();
      }catch(fallbackError){
        console.error("Fallback-Ranking ebenfalls fehlgeschlagen:", fallbackError);
        renderRanking();
      }
    });
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function beginJump(){
  if(!gameRunning) return;

  const canGroundJump = player.grounded || player.coyoteTime > 0;

  if(canGroundJump){
    player.vy = player.jumpPower;
    player.grounded = false;
    player.coyoteTime = 0;
    player.jumpsUsed = 1;
    player.jumpHolding = true;
    player.jumpHoldTime = 0;
  }
}

function releaseJump(){
  player.jumpHolding = false;
}

function endGame(){
  gameRunning = false;
  finalScoreEl.textContent = Math.floor(score);

  if(score > bestScore){
    bestScore = Math.floor(score);
    localStorage.setItem("strommastBestScore", bestScore);
    bestScoreEl.textContent = bestScore;
  }

  gameOverOverlay.classList.remove("hidden");
  setCharacterSelectionLocked(false);
}

function setCharacterSelectionLocked(locked){

  });
}

function createObstacle(){
  const unlockedTypes = Math.min(obstacleTypes.length, 1 + Math.floor(frameCount / 1000));
  const type = obstacleTypes[Math.floor(Math.random() * unlockedTypes)];

  let width = 26;
  let height = 78;

  if(type === "wind"){
    width = 34;
    height = 104;
  }else if(type === "solar"){
    width = 44;
    height = 38;
  }else if(type === "tree"){
    width = 34;
    height = 58;
  }else if(type === "house"){
    width = 54;
    height = 64;
  }

  obstacles.push({
    type,
    x: canvas.width + 20,
    y: groundY + player.height - height,
    width,
    height
  });
}

function updateDifficulty(){
  frameCount++;

  if(frameCount % 520 === 0){
    gameSpeed += 0.07;
  }

  if(frameCount % 1400 === 0){
    gravity += 0.004;
  }
}

function updateJumpHold(){
  if(player.jumpHolding && player.jumpHoldTime < player.maxJumpHoldTime && player.vy < 0){
    player.vy -= 0.24;
    player.jumpHoldTime++;
  }
}

function update(){
  updateDifficulty();
  updateJumpHold();

  if(!player.grounded && player.coyoteTime > 0){
    player.coyoteTime--;
  }

  player.vy += gravity;
  player.y += player.vy;

  if(player.y >= groundY){
    player.y = groundY;
    player.vy = 0;
    player.grounded = true;
    player.jumpHolding = false;
    player.jumpHoldTime = 0;
    player.jumpsUsed = 0;
    player.coyoteTime = 7;
  }else{
    player.grounded = false;
  }

  spawnTimer++;

  const minSpawn = Math.max(102, 164 - Math.floor(frameCount / 450));
  const randomExtra = Math.max(40, 84 - Math.floor(frameCount / 800));

  if(spawnTimer > minSpawn + Math.random() * randomExtra){
    createObstacle();
    spawnTimer = 0;
  }

  for(let i = obstacles.length - 1; i >= 0; i--){
    obstacles[i].x -= gameSpeed;

    if(obstacles[i].x + obstacles[i].width < 0){
      obstacles.splice(i, 1);
      score += 1;
      scoreEl.textContent = Math.floor(score);
    }
  }

  const playerHitbox = selectedCharacter === "unimog"
    ? {
        x: player.x + 5,
        y: player.y + 14,
        width: 42,
        height: 30
      }
    : selectedCharacter === "sprinter"
    ? {
        x: player.x + 6,
        y: player.y + 16,
        width: 41,
        height: 28
      }
    : {
        x: player.x + 8,
        y: player.y + 8,
        width: player.width - 14,
        height: player.height - 10
      };

  for(const ob of obstacles){
    const hit =
      playerHitbox.x < ob.x + ob.width &&
      playerHitbox.x + playerHitbox.width > ob.x &&
      playerHitbox.y < ob.y + ob.height &&
      playerHitbox.y + playerHitbox.height > ob.y;

    if(hit){
      endGame();
      return;
    }
  }
}

function drawGround(){
  ctx.strokeStyle = "#a5b4c3";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY + player.height);
  ctx.lineTo(canvas.width, groundY + player.height);
  ctx.stroke();

  for(let i = 0; i < canvas.width; i += 40){
    ctx.beginPath();
    ctx.moveTo(i, groundY + player.height + 8);
    ctx.lineTo(i + 20, groundY + player.height + 8);
    ctx.strokeStyle = "#cfd7df";
    ctx.stroke();
  }
}

function drawLimb(x, y, length, angle, width = 4){
  const endX = x + Math.cos(angle) * length;
  const endY = y + Math.sin(angle) * length;

  ctx.lineWidth = width;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#1f2d3a";
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(endX, endY);
  ctx.stroke();
}

function drawSideViewRunner(){
  const x = player.x;
  const y = player.y;

  const running = gameRunning && player.grounded;
  const legSwing = running ? Math.sin(frameCount * 0.35) * 0.9 : 0;
  const armSwing = running ? Math.sin(frameCount * 0.35) * 0.7 : 0;

  const hipX1 = x + 15;
  const hipX2 = x + 21;
  const hipY = y + 38;

  const shoulderX1 = x + 11;
  const shoulderX2 = x + 25;
  const shoulderY = y + 24;

  ctx.fillStyle = "#1f2d3a";

  ctx.fillRect(x + 7, y + 14, 7, 2);

  ctx.beginPath();
  ctx.arc(x + 20, y + 12, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillRect(x + 15, y + 20, 8, 18);

  ctx.fillStyle = "#f1c40f";
  ctx.beginPath();
  ctx.arc(x + 20, y + 10, 10, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(x + 12, y + 10, 16, 4);

  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.arc(x + 22, y + 10, 2.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#1f2d3a";
  ctx.beginPath();
  ctx.arc(x + 22.3, y + 10, 0.9, 0, Math.PI * 2);
  ctx.fill();

  if(player.grounded){
    drawLimb(shoulderX1, shoulderY, 11, Math.PI * 0.9 + armSwing, 4);
    drawLimb(shoulderX2, shoulderY, 11, Math.PI * 0.1 - armSwing, 4);

    drawLimb(hipX1, hipY, 18, Math.PI / 2 + legSwing, 4);
    drawLimb(hipX2, hipY, 18, Math.PI / 2 - legSwing, 4);
  }else{
    drawLimb(shoulderX1, shoulderY, 11, Math.PI * 0.95, 4);
    drawLimb(shoulderX2, shoulderY, 11, Math.PI * 0.05, 4);

    drawLimb(hipX1, hipY, 18, Math.PI / 2 + 0.55, 4);
    drawLimb(hipX2, hipY, 18, Math.PI / 2 - 0.35, 4);
  }
}

function drawWheel(cx, cy, r, angle){
  ctx.fillStyle = "#223243";
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#92bce2";
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#b7d5ef";
  ctx.lineWidth = 1.2;
  for(let i = 0; i < 4; i++){
    const a = angle + (Math.PI / 2) * i;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * 5, cy + Math.sin(a) * 5);
    ctx.stroke();
  }
}

function drawPlayer(){
  if(selectedCharacter === "worker"){
    drawSideViewRunner();
    return;
  }

  if(selectedCharacter === "frog"){
    drawFrog();
    return;
  }

  if(selectedCharacter === "donkey"){
    drawDonkey();
    return;
  }

  if(selectedCharacter === "unimog"){
    drawUnimog();
    return;
  }

  if(selectedCharacter === "sprinter"){
    drawSprinter();
    return;
  }

  if(selectedCharacter === "chef"){
    drawChef();
    return;
  }

  if(selectedCharacter === "muskelprotz" || selectedCharacter === "buezer"){
    drawMuskelprotz();
    return;
  }

  drawSideViewRunner();
}

function roundedRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawMast(ob){
  const x = ob.x;

  const h = ob.height;
  const w = ob.width;
  const cx = x + w / 2;

  ctx.save();
  ctx.shadowColor = "rgba(90,58,28,0.15)";
  ctx.shadowBlur = 6;

  ctx.fillStyle = "#8a5a2b";
  ctx.fillRect(cx - 4, y, 8, h);

  ctx.fillStyle = "#b57b43";
  roundedRect(x - 8, y + 12, w + 16, 6, 4);
  ctx.fill();
  roundedRect(x - 6, y + 28, w + 12, 5, 4);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#6b431f";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, y + 17);
  ctx.lineTo(cx - 12, y + 34);
  ctx.moveTo(cx, y + 17);
  ctx.lineTo(cx + 12, y + 34);
  ctx.stroke();

  ctx.restore();
}

function drawWindTurbine(ob){
  const x = ob.x;
  const y = ob.y;
  const centerX = x + ob.width / 2;
  const hubY = y + 22;
  const bladeLen = 16;

  ctx.fillStyle = "#9aabba";
  ctx.fillRect(centerX - 3, y + 20, 6, ob.height - 20);

  ctx.fillStyle = "#768796";
  ctx.beginPath();
  ctx.arc(centerX, hubY, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#677786";
  ctx.lineWidth = 3;
  for(let i = 0; i < 3; i++){
    const angle = frameCount * 0.04 + (i * Math.PI * 2) / 3;
    ctx.beginPath();
    ctx.moveTo(centerX, hubY);
    ctx.lineTo(centerX + Math.cos(angle) * bladeLen, hubY + Math.sin(angle) * bladeLen);
    ctx.stroke();
  }
}

function drawSolarPanel(ob){
  const x = ob.x;
  const y = ob.y;
  const w = ob.width;

  ctx.fillStyle = "#64717d";
  ctx.fillRect(x + 5, y + 18, 5, ob.height - 18);
  ctx.fillRect(x + w - 10, y + 18, 5, ob.height - 18);

  ctx.fillStyle = "#2f5472";
  ctx.fillRect(x, y + 2, w, 18);

  ctx.strokeStyle = "#88a8c2";
  ctx.lineWidth = 1;
  for(let i = 1; i < 4; i++){
    ctx.beginPath();
    ctx.moveTo(x + (w / 4) * i, y + 2);
    ctx.lineTo(x + (w / 4) * i, y + 20);
    ctx.stroke();
  }
}

function drawTree(ob){
  const x = ob.x;
  const y = ob.y;
  const w = ob.width;

  ctx.fillStyle = "#6f4d2e";
  ctx.fillRect(x + w / 2 - 4, y + 24, 8, ob.height - 24);

  ctx.fillStyle = "#3d8f43";
  ctx.beginPath();
  ctx.arc(x + w / 2, y + 20, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w / 2 - 11, y + 26, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w / 2 + 11, y + 26, 10, 0, Math.PI * 2);
  ctx.fill();
}

function drawHouse(ob){
  const x = ob.x;
  const y = ob.y;
  const w = ob.width;

  ctx.fillStyle = "#d9c3a8";
  ctx.fillRect(x + 4, y + 24, w - 8, ob.height - 24);

  ctx.fillStyle = "#b4614b";
  ctx.beginPath();
  ctx.moveTo(x, y + 24);
  ctx.lineTo(x + w / 2, y + 4);
  ctx.lineTo(x + w, y + 24);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#8b5a35";
  ctx.fillRect(x + w / 2 - 6, y + ob.height - 20, 12, 20);

  ctx.fillStyle = "#b7d9ef";
  ctx.fillRect(x + 11, y + 31, 10, 9);
  ctx.fillRect(x + w - 21, y + 31, 10, 9);
}

function drawNuclearPlant(ob){
  const x = ob.x;
  const y = ob.y;
  const w = ob.width;
  const towerWidth = 18;
  const towerHeight = ob.height - 16;

  ctx.fillStyle = "#a6adb4";
  roundedRect(x + 6, y + 8, towerWidth, towerHeight, 9);
  ctx.fill();
  roundedRect(x + w - towerWidth - 6, y + 12, towerWidth, towerHeight - 4, 9);
  ctx.fill();

  ctx.fillStyle = "rgba(220,228,236,0.8)";
  ctx.beginPath();
  ctx.arc(x + 15, y + 2, 9, 0, Math.PI * 2);
  ctx.arc(x + 9, y + 9, 7, 0, Math.PI * 2);
  ctx.arc(x + 21, y + 10, 7, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x + w - 15, y + 6, 9, 0, Math.PI * 2);
  ctx.arc(x + w - 21, y + 13, 7, 0, Math.PI * 2);
  ctx.arc(x + w - 9, y + 14, 7, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#7f8a95";
  ctx.fillRect(x + 24, y + ob.height - 25, w - 48, 25);
}

function drawAnimatedSky(){
  for(let i = 0; i < 6; i++){
    const offset = 0;
    const cx = i * 220 + 60 - offset;
    const cy = 52 + (i % 2) * 18;

    ctx.fillStyle = "rgba(255,255,255,0.74)";
    ctx.beginPath();
    ctx.arc(cx, cy, 18, Math.PI * 0.5, Math.PI * 1.5);
    ctx.arc(cx + 20, cy - 10, 18, Math.PI, Math.PI * 1.85);
    ctx.arc(cx + 42, cy, 18, Math.PI * 1.37, Math.PI * 0.37);
    ctx.closePath();
    ctx.fill();
  }

  for(let i = 0; i < 4; i++){
    const offset = 0;
    const cx = i * 340 + 130 - offset;
    const cy = 86 + (i % 2) * 10;

    ctx.fillStyle = "rgba(255,255,255,0.36)";
    ctx.beginPath();
    ctx.arc(cx, cy, 12, Math.PI * 0.5, Math.PI * 1.5);
    ctx.arc(cx + 14, cy - 7, 12, Math.PI, Math.PI * 1.85);
    ctx.arc(cx + 28, cy, 12, Math.PI * 1.37, Math.PI * 0.37);
    ctx.closePath();
    ctx.fill();
  }
}

function drawLandscape(){
  const farShift = 0;
  const midShift = 0;
  const nearShift = 0;
  const villageShift = 0;

  ctx.fillStyle = "#dce6d8";
  ctx.beginPath();
  ctx.moveTo(-500 - farShift, groundY + 6);
  ctx.quadraticCurveTo(-250 - farShift, 168, 20 - farShift, groundY + 12);
  ctx.quadraticCurveTo(260 - farShift, 182, 520 - farShift, groundY + 8);
  ctx.quadraticCurveTo(750 - farShift, 168, 1040 - farShift, groundY + 12);
  ctx.quadraticCurveTo(1280 - farShift, 184, 1600 - farShift, groundY + 8);
  ctx.lineTo(1600 - farShift, groundY + 56);
  ctx.lineTo(-500 - farShift, groundY + 56);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#c7d7c3";
  ctx.beginPath();
  ctx.moveTo(-350 - midShift, groundY + 16);
  ctx.quadraticCurveTo(-70 - midShift, 205, 180 - midShift, groundY + 18);
  ctx.quadraticCurveTo(420 - midShift, 218, 670 - midShift, groundY + 14);
  ctx.quadraticCurveTo(920 - midShift, 200, 1240 - midShift, groundY + 18);
  ctx.lineTo(1240 - midShift, groundY + 56);
  ctx.lineTo(-350 - midShift, groundY + 56);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#b0c4a7";
  ctx.beginPath();
  ctx.moveTo(-300 - nearShift, groundY + 28);
  ctx.quadraticCurveTo(-20 - nearShift, 220, 220 - nearShift, groundY + 22);
  ctx.quadraticCurveTo(460 - nearShift, 228, 700 - nearShift, groundY + 20);
  ctx.quadraticCurveTo(930 - nearShift, 214, 1220 - nearShift, groundY + 24);
  ctx.lineTo(1220 - nearShift, groundY + 56);
  ctx.lineTo(-300 - nearShift, groundY + 56);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#91a98f";
  for(let i = -2; i < 30; i++){
    const baseX = i * 44 - nearShift;
    const h = 16 + (i % 3) * 7;
    ctx.beginPath();
    ctx.moveTo(baseX, groundY + 10);
    ctx.lineTo(baseX + 12, groundY - h);
    ctx.lineTo(baseX + 24, groundY + 10);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle = "rgba(122,136,150,0.22)";
  for(let i = 0; i < 7; i++){
    const baseX = 20 + i * 165 - villageShift;
    const baseY = groundY - 12 - (i % 2) * 4;

    ctx.fillRect(baseX, baseY - 18, 24, 18);
    ctx.beginPath();
    ctx.moveTo(baseX - 3, baseY - 18);
    ctx.lineTo(baseX + 12, baseY - 30);
    ctx.lineTo(baseX + 27, baseY - 18);
    ctx.closePath();
    ctx.fill();

    ctx.fillRect(baseX + 36, baseY - 14, 18, 14);
    ctx.beginPath();
    ctx.moveTo(baseX + 33, baseY - 14);
    ctx.lineTo(baseX + 45, baseY - 24);
    ctx.lineTo(baseX + 57, baseY - 14);
    ctx.closePath();
    ctx.fill();
  }
}

function drawObstacle(ob){
  if(ob.type === "wind"){
    drawWindTurbine(ob);
    return;
  }

  if(ob.type === "solar"){
    drawSolarPanel(ob);
    return;
  }

  if(ob.type === "tree"){
    drawTree(ob);
    return;
  }

  if(ob.type === "house"){
    drawHouse(ob);
    return;
  }

  drawMast(ob);
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAnimatedSky();
  drawLandscape();
  drawGround();
  drawPlayer();

  for(const ob of obstacles){
    drawObstacle(ob);
  }
}

function loop(){
  if(gameRunning){
    update();
    draw();
    animationId = requestAnimationFrame(loop);
  }else{
    draw();
  }
}

document.addEventListener("keydown", (e) => {
  if(e.code === "Space" || e.code === "ArrowUp"){
    e.preventDefault();

    if(!gameRunning && startOverlay.classList.contains("hidden") && !gameOverOverlay.classList.contains("hidden")){
      return;
    }

    if(!startOverlay.classList.contains("hidden")){
      startGame();
      return;
    }

    if(!e.repeat){
      beginJump();
    }
  }
});

document.addEventListener("keyup", (e) => {
  if(e.code === "Space" || e.code === "ArrowUp"){
    releaseJump();
  }
});

canvas.addEventListener("mousedown", () => {
  if(!startOverlay.classList.contains("hidden")){
    startGame();
    return;
  }

  if(gameRunning){
    beginJump();
  }
});

canvas.addEventListener("mouseup", releaseJump);
canvas.addEventListener("mouseleave", releaseJump);

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();

  if(!startOverlay.classList.contains("hidden")){
    startGame();
    return;
  }

  if(gameRunning){
    beginJump();
  }
}, { passive:false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  releaseJump();
}, { passive:false });

fullscreenBtn.addEventListener("click", enterFullscreen);
exitFullscreenBtn.addEventListener("click", exitFullscreen);

document.addEventListener("fullscreenchange", updateFullscreenButtons);
document.addEventListener("webkitfullscreenchange", updateFullscreenButtons);
document.addEventListener("msfullscreenchange", updateFullscreenButtons);

subscribeRanking();
fetchRankingFromFirestore();

auth.onAuthStateChanged((user) => {
  if(!user){
    alert("Bitte zuerst auf der Startseite einloggen.");
    window.location.href = "home.html";
  }
});
renderRanking();
updateFullscreenButtons();
draw();

characterButtons.forEach((button) => {
  button.addEventListener("click", () => {
    if(gameRunning){
      return;
    }

    selectedCharacter = button.dataset.character;
    characterHint.classList.add("hidden-message");

    characterButtons.forEach((btn) => {
      btn.classList.toggle("active", btn === button);
    });

    draw();
  });
});
</script>
