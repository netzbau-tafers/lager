<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bobinen Lager</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#eef2f7;
margin:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

button{
padding:8px 14px;
cursor:pointer;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-weight:500;
}

button:hover{
background:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#1f2937;
color:white;
}

tr:nth-child(even){
background:#f8fafc;
}

.inuse{
background:#ffe5e5 !important;
}

.instock{
background:#e6ffe6 !important;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.modal-content{
background:white;
padding:25px;
width:420px;
margin:8% auto;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:6px 0 12px 0;
border:1px solid #ccc;
border-radius:6px;
}

.actions button{
margin:2px;
}

.topbar{
margin-bottom:15px;
}

</style>
</head>

<body>

<h1>Bobinen Lager Management</h1>

<div class="topbar">
<button onclick="openAdd()">Neue Bobine hinzufügen</button>
</div>

<table>

<thead>
<tr>
<th>Nummer</th>
<th>Kabeltyp</th>
<th>Länge</th>
<th>Baustelle</th>
<th>Hersteller</th>
<th>Status</th>
<th>Aktion</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>


<div id="formModal" class="modal">

<div class="modal-content">

<h3 id="modalTitle">Neue Bobine</h3>

<input id="nummer" placeholder="Nummer">
<input id="typ" placeholder="Kabeltyp">
<input id="laenge" placeholder="Länge (m)">
<input id="baustelle" placeholder="Baustelle">
<input id="hersteller" placeholder="Hersteller">

<button onclick="saveBobine()">Speichern</button>
<button onclick="closeModal()">Abbrechen</button>

</div>
</div>


<div id="returnModal" class="modal">

<div class="modal-content">

<h3>Bobine zurück ins Lager</h3>

<p>Länge aktualisieren</p>
<input id="returnLaenge">

<p>Baustelle</p>
<input id="returnBaustelle">

<button onclick="confirmReturn()">Speichern</button>
<button onclick="closeModal()">Abbrechen</button>

</div>
</div>


<script>

let bobinen = JSON.parse(localStorage.getItem("bobinen")) || [];
let editIndex = null;
let selectedIndex = null;

function save(){
localStorage.setItem("bobinen",JSON.stringify(bobinen));
}

function render(){

let table=document.getElementById("table");
table.innerHTML="";

bobinen.forEach((b,i)=>{

let row=document.createElement("tr");

row.className = b.status=="Lager" ? "instock":"inuse";

row.innerHTML=`

<td>${b.nummer}</td>
<td>${b.typ}</td>
<td>${b.laenge}</td>
<td>${b.baustelle}</td>
<td>${b.hersteller}</td>
<td>${b.status}</td>

<td class="actions">

<button onclick="toggle(${i})">Status</button>
<button onclick="edit(${i})">Bearbeiten</button>

</td>

`;

table.appendChild(row);

});

}

function openAdd(){

editIndex=null;

document.getElementById("modalTitle").innerText="Neue Bobine";

nummer.value="";
typ.value="";
laenge.value="";
baustelle.value="";
hersteller.value="";

document.getElementById("formModal").style.display="block";

}

function edit(i){

editIndex=i;

let b=bobinen[i];

document.getElementById("modalTitle").innerText="Bobine bearbeiten";

nummer.value=b.nummer;
typ.value=b.typ;
laenge.value=b.laenge;
baustelle.value=b.baustelle;
hersteller.value=b.hersteller;

document.getElementById("formModal").style.display="block";

}

function saveBobine(){

let b={

nummer:nummer.value,
typ:typ.value,
laenge:laenge.value,
baustelle:baustelle.value,
hersteller:hersteller.value,
status:"Lager"

};

if(editIndex===null){

bobinen.push(b);

}else{

b.status=bobinen[editIndex].status;
bobinen[editIndex]=b;

}

save();
render();
closeModal();

}

function toggle(i){

if(bobinen[i].status=="Lager"){

bobinen[i].status="In Gebrauch";

save();
render();

}else{

selectedIndex=i;

returnLaenge.value=bobinen[i].laenge;
returnBaustelle.value=bobinen[i].baustelle;

document.getElementById("returnModal").style.display="block";

}

}

function confirmReturn(){

bobinen[selectedIndex].laenge=returnLaenge.value;
bobinen[selectedIndex].baustelle=returnBaustelle.value;
bobinen[selectedIndex].status="Lager";

save();
render();

closeModal();

}

function closeModal(){

document.querySelectorAll(".modal").forEach(m=>m.style.display="none");

}

render();

</script>

</body>
</html>
