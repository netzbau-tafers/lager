<body>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
  authDomain: "netzbau-tafers.firebaseapp.com",
  projectId: "netzbau-tafers",
  storageBucket: "netzbau-tafers.appspot.com",
  messagingSenderId: "389541837675",
  appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
  measurementId: "G-B5MJGD3108"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const bobinenCollection = db.collection("bobinen");
const logsCollection = db.collection("logs");

const PREDEFINED_KABELTYPEN = [
  "GKN 3x6/6mm Cu",
  "GKN 3x10/10mm Cu",
  "GKN 3x16/16mm Cu",
  "GKN 3x25/25mm Cu",
  "GKN 3x50/50mm Cu",
  "GKN 3x95/95 Cu",
  "GKN 3x95/95 Cu Flex",
  "GKN 3X150/150MM Cu",
  "GKN 3x1x150/50 Cu",
  "GKN 3x1x240/80 Cu"
];

let editId = null;
let selectedId = null;
let alleBobinen = [];
let unsubscribeBobinen = null;
let openDetailsRows = new Set();

function writeLog(bereich, aktion, objektTyp, objektId, details){
  const user = auth.currentUser;

  return logsCollection.add({
    bereich: bereich,
    aktion: aktion,
    objektTyp: objektTyp,
    objektId: objektId || "",
    benutzerEmail: user && user.email ? user.email : "",
    benutzerUid: user && user.uid ? user.uid : "",
    details: details || "",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(error => {
    console.error("Fehler beim Schreiben des Logs:", error);
  });
}

function sanitizeInput(value, maxLength = 200){
  return String(value || "")
    .replace(/[<>]/g, "")
    .replace(/[\u0000-\u001F\u007F]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, maxLength);
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatDatum(value){
  if(!value){
    return "";
  }

  try{
    if(typeof value.toDate === "function"){
      return value.toDate().toLocaleDateString("de-CH");
    }

    if(value.seconds){
      return new Date(value.seconds * 1000).toLocaleDateString("de-CH");
    }

    return new Date(value).toLocaleDateString("de-CH");
  }catch(error){
    return "";
  }
}

function handleTypChange(){
  const typSelect = document.getElementById("typSelect");
  const typCustom = document.getElementById("typCustom");

  if(!typSelect || !typCustom){
    return;
  }

  if(typSelect.value === "__ANDERER__"){
    typCustom.classList.remove("hidden");
    typCustom.focus();
  }else{
    typCustom.classList.add("hidden");
    typCustom.value = "";
  }
}

function getSelectedTyp(){
  const typSelect = document.getElementById("typSelect");
  const typCustom = document.getElementById("typCustom");

  if(!typSelect || !typCustom){
    return "";
  }

  if(typSelect.value === "__ANDERER__"){
    return sanitizeInput(typCustom.value, 120);
  }

  return sanitizeInput(typSelect.value, 120);
}

function setTypFields(typValue){
  const saubererTyp = sanitizeInput(typValue, 120);
  const typSelect = document.getElementById("typSelect");
  const typCustom = document.getElementById("typCustom");

  if(!typSelect || !typCustom){
    return;
  }

  if(PREDEFINED_KABELTYPEN.includes(saubererTyp)){
    typSelect.value = saubererTyp;
    typCustom.value = "";
    typCustom.classList.add("hidden");
  }else if(saubererTyp !== ""){
    typSelect.value = "__ANDERER__";
    typCustom.classList.remove("hidden");
    typCustom.value = saubererTyp;
  }else{
    typSelect.value = "";
    typCustom.value = "";
    typCustom.classList.add("hidden");
  }
}

function renderFilteredTable(){
  const suchbegriff = document.getElementById("searchInput").value.trim().toLowerCase();
  const statusFilter = document.getElementById("statusFilter").value;

  const gefiltert = alleBobinen.filter(docItem => {
    const b = docItem.data();

    const nummer = String(b.nummer || "").toLowerCase();
    const typ = String(b.typ || "").toLowerCase();
    const baustelle = String(b.baustelle || "").toLowerCase();
    const hersteller = String(b.hersteller || "").toLowerCase();
    const infos = String(b.infos || "").toLowerCase();
    const status = String(b.status || "");

    const suchbegriffLeer = suchbegriff === "";
    const textPasst =
      suchbegriffLeer ||
      nummer.includes(suchbegriff) ||
      typ.includes(suchbegriff) ||
      baustelle.includes(suchbegriff) ||
      hersteller.includes(suchbegriff) ||
      infos.includes(suchbegriff);

    const statusPasst =
      statusFilter === "Alle" || status === statusFilter;

    return textPasst && statusPasst;
  });

  const noResults = document.getElementById("noResults");
  if(gefiltert.length === 0){
    noResults.style.display = "block";
  }else{
    noResults.style.display = "none";
  }

  renderDesktopTable(gefiltert);
  renderMobileCards(gefiltert);

  document.getElementById("resultInfo").innerText = "Angezeigte Bobinen: " + gefiltert.length;
}

function resetSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("statusFilter").value = "Alle";
  renderFilteredTable();
}

function startDatabaseListener(){
  if(unsubscribeBobinen){
    return;

  unsubscribeBobinen = bobinenCollection.onSnapshot(snapshot => {
    alleBobinen = snapshot.docs;
    renderFilteredTable();
  }, error => {
    console.error("Fehler bei Live-Daten:", error);
    alert("Fehler beim Laden der Firebase-Daten.");
  });
}

function nummerBereinigen(wert){
  return sanitizeInput(wert, 60);
}

function nummerSchonVorhanden(nummer, aktuelleId = null){
  return bobinenCollection.where("nummer", "==", nummer).get().then(snapshot => {
    let vorhanden = false;

    snapshot.forEach(doc => {
      if(doc.id !== aktuelleId){
        vorhanden = true;
      }
    });

    return vorhanden;
  });
}

function markActiveMenu(){
  const path = window.location.pathname.toLowerCase();
  let currentPage = "";

  if(path.includes("index")){
    currentPage = "index";
  }else if(path.includes("baustellen")){
    currentPage = "baustellen";
  }else if(path.includes("archiv")){
    currentPage = "archiv";
  }else if(path.includes("logs")){
    currentPage = "logs";
  }

  const buttons = document.querySelectorAll("#dropdownMenu button");

  buttons.forEach(btn => {
    const page = btn.getAttribute("data-page");
    if(page === currentPage){
      btn.classList.add("active-page");
    }
  });
}

document.addEventListener("DOMContentLoaded", markActiveMenu);

function saveBobine(){
  const nummerWert = nummerBereinigen(document.getElementById("nummer").value);
  const typ = getSelectedTyp();
  const laenge = sanitizeInput(document.getElementById("laenge").value, 40);
  const baustelle = sanitizeInput(document.getElementById("baustelle").value, 120);
  const hersteller = sanitizeInput(document.getElementById("hersteller").value, 120);
  const infos = sanitizeInput(document.getElementById("infos").value, 250);

  document.getElementById("nummer").value = nummerWert;
  document.getElementById("laenge").value = laenge;
  document.getElementById("baustelle").value = baustelle;
  document.getElementById("hersteller").value = hersteller;
  document.getElementById("infos").value = infos;
  if(document.getElementById("typSelect").value === "__ANDERER__"){
    document.getElementById("typCustom").value = typ;
  }

  if(nummerWert === ""){
    alert("Bitte eine Nummer eingeben.");
    return;
  }

  if(typ === ""){
    alert("Bitte einen Kabeltyp auswählen oder eingeben.");
    return;
  }

  const data = {
    nummer: nummerWert,
    typ: typ,
    laenge: laenge,
    baustelle: baustelle,
    hersteller: hersteller,
    infos: infos
  };

  nummerSchonVorhanden(nummerWert, editId).then(vorhanden => {
    if(vorhanden){
      alert("Diese Bobinen-Nummer ist bereits im Lager vorhanden.");
      return;
    }

    if(editId){
      bobinenCollection.doc(editId).get().then(doc => {
        if(!doc.exists){
          alert("Bobine nicht gefunden.");
          return;
        }

        const alterStatus = doc.data().status || "Lager";
        data.status = alterStatus;

        return bobinenCollection.doc(editId).update(data).then(() => {
          writeLog(
            "Kabellager",
            "Bobine bearbeitet",
            "bobine",
            editId,
            "Nummer: " + nummerWert +
            " | Typ: " + typ +
            " | Länge: " + laenge +
            " | Baustelle: " + baustelle +
            " | Hersteller: " + hersteller +
            " | Infos: " + infos +
            " | Status: " + alterStatus
          );
        });
      }).then(() => {
        closeModal();
      }).catch(error => {
        console.error("Fehler beim Bearbeiten:", error);
        alert("Fehler beim Speichern.");
      });
    }else{
      data.status = "Lager";
      data.hinzugefuegtAm = firebase.firestore.FieldValue.serverTimestamp();

      bobinenCollection.add(data).then((docRef) => {
        writeLog(
          "Kabellager",
          "Bobine erstellt",
          "bobine",
          docRef.id,
          "Nummer: " + nummerWert +
          " | Typ: " + typ +
          " | Länge: " + laenge +
          " | Baustelle: " + baustelle +
          " | Hersteller: " + hersteller +
          " | Infos: " + infos
        );
        closeModal();
      }).catch(error => {
        console.error("Fehler beim Hinzufügen:", error);
        alert("Fehler beim Hinzufügen.");
      });
    }
  }).catch(error => {
    console.error("Fehler bei Nummernprüfung:", error);
    alert("Fehler bei der Prüfung der Nummer.");
  });
}

  bobinenCollection.doc(id).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    const text =
      "Bobine wirklich löschen?\n\n" +
      "Nummer: " + sanitizeInput(b.nummer || "", 60) + "\n" +
      "Kabeltyp: " + sanitizeInput(b.typ || "", 120) + "\n" +
      "Länge: " + sanitizeInput(b.laenge || "", 40) + "\n" +
      "Baustelle: " + sanitizeInput(b.baustelle || "", 120) + "\n" +
      "Infos: " + sanitizeInput(b.infos || "", 250) + "\n\n" +
      "Diese Bobine wird endgültig aus dem Kabellager entfernt.";

    if(confirm(text)){

        openDetailsRows.delete(id);
        writeLog(
          "Kabellager",
          "Bobine gelöscht",
          "bobine",
          id,
          "Nummer: " + (b.nummer || "") +
          " | Typ: " + (b.typ || "") +

        );
      }).catch(error => {
        console.error("Fehler beim Löschen:", error);
        alert("Fehler beim Löschen.");
      });

  }).catch(error => {
    console.error("Fehler beim Laden der Bobine:", error);
    alert("Fehler beim Laden der Bobinen-Daten.");
  });
}

function focusFirstInput(modalId){
  setTimeout(() => {
    const modal = document.getElementById(modalId);
    if(!modal){
      return;
    }

    const firstInput = modal.querySelector("input, textarea, select");
    if(firstInput){
      firstInput.focus();
      if(typeof firstInput.select === "function"){
        firstInput.select();
      }
    }
  }, 50);
}

function bindEnterSubmit(containerId, callback){
  const container = document.getElementById(containerId);
  if(!container){
    return;
  }

  container.addEventListener("keydown", function(event){
    if(event.key !== "Enter"){
      return;
    }

    if(event.target.tagName === "TEXTAREA"){
      return;
    }

    if(event.target.tagName === "SELECT"){
      return;
    }

    event.preventDefault();
    callback();
  });
}

document.addEventListener("DOMContentLoaded", function(){
  bindEnterSubmit("loginScreen", login);
  bindEnterSubmit("modal", saveBobine);
  bindEnterSubmit("returnModal", confirmReturn);
});
</script>
