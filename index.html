<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagermanager</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>

body{
  font-family:Arial, sans-serif;
  background:#f2f4f7;
  margin:40px;
  color:#222;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header h1{
  margin:0;
}

.menu-wrap{
  position:relative;
}

.menu-button{
  background:#555;
  color:white;
  border:none;
  border-radius:8px;
  padding:10px 14px;
  font-size:22px;
  line-height:1;
  cursor:pointer;
}

.menu-button:hover{
  background:#333;
}

.dropdown-menu{
  display:none;
  position:absolute;
  top:48px;
  right:0;
  min-width:220px;
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
  padding:8px;
  z-index:2000;
}

.dropdown-menu.open{
  display:block;
}

.dropdown-menu button{
  width:100%;
  text-align:left;
  margin:0 0 8px 0;
}

.dropdown-menu button:last-child{
  margin-bottom:0;
}

.logout-safe{
  background:#777;
}

.logout-safe:hover{
  background:#555;
}

button{
  padding:10px 14px;
  cursor:pointer;
  border:none;
  border-radius:6px;
  background:#3498db;
  color:white;
  margin:2px;
  font-size:14px;
}

button:hover{
  background:#2980b9;
}

.delete{
  background:#e74c3c;
}

.delete:hover{
  background:#c0392b;
}

.reset{
  background:#7f8c8d;
}

.reset:hover{
  background:#636e72;
}

.search-box{
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-title{
  font-weight:bold;
  margin-bottom:10px;
}

.search-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
}

.filter-row{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:12px;
}

#searchInput{
  margin:0;
  font-size:16px;
  padding:12px;
}

select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
  background:white;
}

.info-box{
  margin-top:10px;
  margin-bottom:10px;
  font-size:14px;
  color:#444;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#2c3e50;
  color:white;
}

.inuse{
  background:#ffd9d9;
}

.instock{
  background:#d9ffd9;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1000;
}

.modal-content{
  background:white;
  padding:20px;
  width:420px;
  max-width:92%;
  margin:40px auto;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

.no-results{
  text-align:center;
  background:white;
  padding:20px;
  border:1px solid #ccc;
  border-top:none;
}

.login-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f2f4f7;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
}

.login-card{
  background:white;
  width:420px;
  padding:25px;
  border-radius:12px;
}

.login-error{
  color:#c0392b;
  display:none;
  margin-top:10px;
  text-align:center;
}

</style>
</head>

<body>

<div id="loginScreen" class="login-screen">
<div class="login-card">

<h2>Login Kabellager</h2>

<input id="loginEmail" type="email" placeholder="E-Mail">
<input id="loginPassword" type="password" placeholder="Passwort">

<button onclick="login()">Login</button>

<p id="loginError" class="login-error">
Login fehlgeschlagen
</p>

</div>
</div>

<div id="appContent" style="display:none;">

<div class="header">

<h1>Kabellager</h1>

<div class="menu-wrap">

<button class="menu-button" onclick="toggleMenu(event)">☰</button>

<div id="dropdownMenu" class="dropdown-menu">

<button onclick="goToBaustellenmaterial()">
Zum Baustellenmaterial
</button>

<button class="logout-safe" onclick="logout()">
Logout
</button>

</div>
</div>
</div>

<div class="search-box">

<div class="search-title">Suche</div>

<div class="search-row">
<input id="searchInput" type="text" placeholder="Nach Nummer, Kabeltyp oder Baustelle suchen" oninput="renderFilteredTable()">
<button class="reset" onclick="resetSearch()">Suche zurücksetzen</button>
</div>

<div class="filter-row">

<select id="statusFilter" onchange="renderFilteredTable()">
<option value="Alle">Alle</option>
<option value="Lager">Lager</option>
<option value="In Gebrauch">In Gebrauch</option>
</select>

</div>

<div style="margin-top:15px;">
<button onclick="openAdd()">Neue Bobine hinzufügen</button>
</div>

</div>

<div class="info-box" id="resultInfo"></div>

<table>

<thead>
<tr>
<th>Nummer</th>
<th>Kabeltyp</th>
<th>Länge</th>
<th>Baustelle</th>
<th>Hersteller</th>
<th>Status</th>
<th>Aktionen</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div id="noResults" class="no-results" style="display:none;">
Keine passenden Bobinen gefunden
</div>

<div id="modal" class="modal">

<div class="modal-content">

<h3 id="modalTitle">Neue Bobine</h3>

<input id="nummer" placeholder="Nummer">
<input id="typ" placeholder="Kabeltyp">
<input id="laenge" placeholder="Länge (m)">
<input id="baustelle" placeholder="Baustelle">
<input id="hersteller" placeholder="Hersteller">

<button onclick="saveBobine()">Speichern</button>
<button onclick="closeModal()">Abbrechen</button>

</div>
</div>

<div id="returnModal" class="modal">

<div class="modal-content">

<h3>Bobine zurück ins Lager</h3>

<p>Länge aktualisieren</p>
<input id="returnLaenge">

<p>Baustelle</p>
<input id="returnBaustelle">

<button onclick="confirmReturn()">Speichern</button>
<button onclick="closeModal()">Abbrechen</button>

</div>
</div>

</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
authDomain:"netzbau-tafers.firebaseapp.com",
projectId:"netzbau-tafers",
storageBucket:"netzbau-tafers.appspot.com",
messagingSenderId:"389541837675",
appId:"1:389541837675:web:db580ce67c57a9a16dea2e"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

const bobinenCollection=db.collection("bobinen");

let editId=null;
let selectedId=null;
let alleBobinen=[];
let unsubscribeBobinen=null;

function toggleMenu(event){
event.stopPropagation();
document.getElementById("dropdownMenu").classList.toggle("open");
}

function closeMenu(){
document.getElementById("dropdownMenu").classList.remove("open");
}

document.addEventListener("click",function(event){

const menuWrap=document.querySelector(".menu-wrap");

if(!menuWrap.contains(event.target)){
closeMenu();
}

});

function goToBaustellenmaterial(){
closeMenu();
window.location.href="baustellen.html";
}

function login(){

const email=document.getElementById("loginEmail").value;
const password=document.getElementById("loginPassword").value;

auth.signInWithEmailAndPassword(email,password)

.then(()=>{
document.getElementById("loginError").style.display="none";
})

.catch(()=>{
document.getElementById("loginError").style.display="block";
});

}

function logout(){

closeMenu();

if(!confirm("Wirklich ausloggen?")) return;

auth.signOut();

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("loginScreen").style.display="none";
document.getElementById("appContent").style.display="block";

startDatabaseListener();

}else{

document.getElementById("loginScreen").style.display="flex";
document.getElementById("appContent").style.display="none";

}

});

function startDatabaseListener(){

unsubscribeBobinen=bobinenCollection.onSnapshot(snapshot=>{

alleBobinen=snapshot.docs;

renderFilteredTable();

});

}

function renderFilteredTable(){

const suchbegriff=document.getElementById("searchInput").value.toLowerCase();

const statusFilter=document.getElementById("statusFilter").value;

const gefiltert=alleBobinen.filter(doc=>{

const b=doc.data();

const nummer=(b.nummer||"").toLowerCase();
const typ=(b.typ||"").toLowerCase();
const baustelle=(b.baustelle||"").toLowerCase();

const status=b.status||"";

const textPasst=
nummer.includes(suchbegriff)||
typ.includes(suchbegriff)||
baustelle.includes(suchbegriff);

const statusPasst=
statusFilter==="Alle"||status===statusFilter;

return textPasst&&statusPasst;

});

renderTable(gefiltert);

}

function renderTable(data){

const table=document.getElementById("table");

table.innerHTML="";

data.forEach(doc=>{

const b=doc.data();

const tr=document.createElement("tr");

tr.className=b.status==="Lager"?"instock":"inuse";

tr.innerHTML=`
<td>${b.nummer||""}</td>
<td>${b.typ||""}</td>
<td>${b.laenge||""}</td>
<td>${b.baustelle||""}</td>
<td>${b.hersteller||""}</td>
<td>${b.status||""}</td>
<td>
<button onclick="toggleStatus('${doc.id}')">Status</button>
<button onclick="editBobine('${doc.id}')">Bearbeiten</button>
<button class="delete" onclick="deleteBobine('${doc.id}')">Löschen</button>
</td>
`;

table.appendChild(tr);

});

document.getElementById("resultInfo").innerText=
"Angezeigte Bobinen: "+data.length;

}

function resetSearch(){

document.getElementById("searchInput").value="";
document.getElementById("statusFilter").value="Alle";

renderFilteredTable();

}

function openAdd(){

editId=null;

document.getElementById("modalTitle").innerText="Neue Bobine";

document.getElementById("nummer").value="";
document.getElementById("typ").value="";
document.getElementById("laenge").value="";
document.getElementById("baustelle").value="";
document.getElementById("hersteller").value="";

document.getElementById("modal").style.display="block";

}

function editBobine(id){

editId=id;

bobinenCollection.doc(id).get()

.then(doc=>{

const b=doc.data();

document.getElementById("modalTitle").innerText="Bobine bearbeiten";

document.getElementById("nummer").value=b.nummer||"";
document.getElementById("typ").value=b.typ||"";
document.getElementById("laenge").value=b.laenge||"";
document.getElementById("baustelle").value=b.baustelle||"";
document.getElementById("hersteller").value=b.hersteller||"";

document.getElementById("modal").style.display="block";

});

}

function saveBobine(){

const nummer=document.getElementById("nummer").value;

const data={
nummer:nummer,
typ:document.getElementById("typ").value,
laenge:document.getElementById("laenge").value,
baustelle:document.getElementById("baustelle").value,
hersteller:document.getElementById("hersteller").value
};

if(editId){

bobinenCollection.doc(editId).update(data);

}else{

data.status="Lager";

bobinenCollection.add(data);

}

closeModal();

}

function toggleStatus(id){

bobinenCollection.doc(id).get()

.then(doc=>{

const b=doc.data();

if(b.status==="Lager"){

bobinenCollection.doc(id).update({status:"In Gebrauch"});

}else{

selectedId=id;

document.getElementById("returnLaenge").value=b.laenge||"";
document.getElementById("returnBaustelle").value=b.baustelle||"";

document.getElementById("returnModal").style.display="block";

}

});

}

function confirmReturn(){

bobinenCollection.doc(selectedId).update({

laenge:document.getElementById("returnLaenge").value,
baustelle:document.getElementById("returnBaustelle").value,
status:"Lager"

});

closeModal();

}

function deleteBobine(id){

if(confirm("Bobine wirklich löschen?")){

bobinenCollection.doc(id).delete();

}

}

function closeModal(){

document.getElementById("modal").style.display="none";
document.getElementById("returnModal").style.display="none";

}

</script>

</body>
</html>
