<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagermanager</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f2f4f7;
  margin:40px;
  color:#222;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

button{
  padding:10px 14px;
  cursor:pointer;
  border:none;
  border-radius:6px;
  background:#3498db;
  color:white;
  margin:2px;
  font-size:14px;
}

button:hover{
  background:#2980b9;
}

.delete{
  background:#e74c3c;
}

.delete:hover{
  background:#c0392b;
}

.reset{
  background:#7f8c8d;
}

.reset:hover{
  background:#636e72;
}

.search-box{
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-title{
  font-weight:bold;
  margin-bottom:10px;
}

.search-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
}

.filter-row{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  align-items:center;
  margin-top:12px;
}

#searchInput{
  margin:0;
  font-size:16px;
  padding:12px;
}

select{
  width:100%;
  padding:10px;
  margin:0;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
  background:white;
}

.info-box{
  margin-top:10px;
  margin-bottom:10px;
  font-size:14px;
  color:#444;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
  vertical-align:middle;
}

th{
  background:#2c3e50;
  color:white;
}

.inuse{
  background:#ffd9d9;
}

.instock{
  background:#d9ffd9;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1000;
}

.modal-content{
  background:white;
  padding:20px;
  width:420px;
  max-width:92%;
  margin:8% auto;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

.no-results{
  text-align:center;
  background:white;
  padding:20px;
  border:1px solid #ccc;
  border-top:none;
}

.login-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f2f4f7;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3000;
  padding:20px;
  box-sizing:border-box;
}

.login-card{
  background:white;
  width:420px;
  max-width:95%;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-card h2{
  margin-top:0;
  text-align:center;
}

.login-error{
  color:#c0392b;
  display:none;
  margin-top:10px;
  text-align:center;
}

.login-info{
  color:#555;
  font-size:14px;
  text-align:center;
  margin-bottom:15px;
}

.logout{
  background:#555;
}

.logout:hover{
  background:#333;
}

@media (max-width: 900px){
  body{
    margin:15px;
  }

  .search-row{
    grid-template-columns:1fr;
  }

  button{
    font-size:16px;
    padding:12px 16px;
  }

  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  table{
    background:transparent;
    box-shadow:none;
  }

  tr{
    background:white;
    margin-bottom:15px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
  }

  td{
    border:none;
    text-align:left;
    padding:6px 0;
  }

  td:before{
    font-weight:bold;
    display:block;
    margin-bottom:2px;
    color:#333;
  }

  td:nth-child(1):before{content:"Nummer";}
  td:nth-child(2):before{content:"Kabeltyp";}
  td:nth-child(3):before{content:"Länge";}
  td:nth-child(4):before{content:"Baustelle";}
  td:nth-child(5):before{content:"Hersteller";}
  td:nth-child(6):before{content:"Status";}
  td:nth-child(7):before{content:"Aktionen";}

  .modal-content{
    width:95%;
    margin:15% auto;
  }
}
</style>
</head>

<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Login Kabellager</h2>
    <div class="login-info">Bitte mit E-Mail und Passwort anmelden</div>
    <input id="loginEmail" type="email" placeholder="E-Mail">
    <input id="loginPassword" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <p id="loginError" class="login-error">Login fehlgeschlagen. Bitte Daten prüfen.</p>
  </div>
</div>

<div id="appContent" style="display:none;">

<h1>Kabellager</h1>

<div class="topbar">
  <button class="back" onclick="window.location.href='baustellen.html'">Baustellen Material</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="search-box">
  <div class="search-title">Suche</div>
  <div class="search-row">
    <input id="searchInput" type="text" placeholder="Nach Nummer, Kabeltyp oder Baustelle suchen" oninput="renderFilteredTable()">
    <button class="reset" onclick="resetSearch()">Suche zurücksetzen</button>
  </div>

  <div class="filter-row">
    <select id="statusFilter" onchange="renderFilteredTable()">
      <option value="Alle">Alle</option>
      <option value="Lager">Lager</option>
      <option value="In Gebrauch">In Gebrauch</option>
    </select>
  </div>

  <div style="margin-top:15px;">
    <button onclick="openAdd()">Neue Bobine hinzufügen</button>
  </div>
</div>

<div class="info-box" id="resultInfo"></div>

<table>
  <thead>
    <tr>
      <th>Nummer</th>
      <th>Kabeltyp</th>
      <th>Länge</th>
      <th>Baustelle</th>
      <th>Hersteller</th>
      <th>Status</th>
      <th>Aktionen</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<div id="noResults" class="no-results" style="display:none;">
  Keine passenden Bobinen gefunden.
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Neue Bobine</h3>

    <input id="nummer" placeholder="Nummer">
    <input id="typ" placeholder="Kabeltyp">
    <input id="laenge" placeholder="Länge (m)">
    <input id="baustelle" placeholder="Baustelle">
    <input id="hersteller" placeholder="Hersteller">

    <button onclick="saveBobine()">Speichern</button>
    <button onclick="closeModal()">Abbrechen</button>
  </div>
</div>

<div id="returnModal" class="modal">
  <div class="modal-content">
    <h3>Bobine zurück ins Lager</h3>

    <p>Länge aktualisieren</p>
    <input id="returnLaenge" placeholder="Länge (m)">

    <p>Baustelle</p>
    <input id="returnBaustelle" placeholder="Baustelle">

    <button onclick="confirmReturn()">Speichern</button>
    <button onclick="closeModal()">Abbrechen</button>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
  authDomain: "netzbau-tafers.firebaseapp.com",
  projectId: "netzbau-tafers",
  storageBucket: "netzbau-tafers.appspot.com",
  messagingSenderId: "389541837675",
  appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
  measurementId: "G-B5MJGD3108"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const bobinenCollection = db.collection("bobinen");

let editId = null;
let selectedId = null;
let alleBobinen = [];

function login(){
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("loginError").style.display = "none";
      document.getElementById("loginPassword").value = "";
    })
    .catch((error) => {
      console.error("Login Fehler:", error);
      document.getElementById("loginError").style.display = "block";
    });
}

function logout(){
  auth.signOut().catch((error) => {
    console.error("Logout Fehler:", error);
    alert("Fehler beim Logout.");
  });
}

auth.onAuthStateChanged((user) => {

  if(user){

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appContent").style.display = "block";

    startDatabaseListener(); // Daten laden sobald Login fertig

  }else{

    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("appContent").style.display = "none";

  }

});

function renderTable(data){
  const table = document.getElementById("table");
  const noResults = document.getElementById("noResults");
  table.innerHTML = "";

  if(data.length === 0){
    noResults.style.display = "block";
  }else{
    noResults.style.display = "none";
  }

  data.forEach(docItem => {
    const b = docItem.data();
    const tr = document.createElement("tr");

    tr.className = b.status === "Lager" ? "instock" : "inuse";

    tr.innerHTML = `
      <td>${b.nummer || ""}</td>
      <td>${b.typ || ""}</td>
      <td>${b.laenge || ""}</td>
      <td>${b.baustelle || ""}</td>
      <td>${b.hersteller || ""}</td>
      <td>${b.status || ""}</td>
      <td>
        <button onclick="toggleStatus('${docItem.id}')">Status</button>
        <button onclick="editBobine('${docItem.id}')">Bearbeiten</button>
        <button class="delete" onclick="deleteBobine('${docItem.id}')">Löschen</button>
      </td>
    `;

    table.appendChild(tr);
  });

  document.getElementById("resultInfo").innerText = "Angezeigte Bobinen: " + data.length;
}

function renderFilteredTable(){
  const suchbegriff = document.getElementById("searchInput").value.trim().toLowerCase();
  const statusFilter = document.getElementById("statusFilter").value;

  const gefiltert = alleBobinen.filter(docItem => {
    const b = docItem.data();

    const nummer = String(b.nummer || "").toLowerCase();
    const typ = String(b.typ || "").toLowerCase();
    const baustelle = String(b.baustelle || "").toLowerCase();
    const status = String(b.status || "");

    const suchbegriffLeer = suchbegriff === "";
    const textPasst =
      suchbegriffLeer ||
      nummer.includes(suchbegriff) ||
      typ.includes(suchbegriff) ||
      baustelle.includes(suchbegriff);

    const statusPasst =
      statusFilter === "Alle" || status === statusFilter;

    return textPasst && statusPasst;
  });

  renderTable(gefiltert);
}

function resetSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("statusFilter").value = "Alle";
  renderFilteredTable();
}

function startDatabaseListener(){

  bobinenCollection.onSnapshot(snapshot => {

    alleBobinen = snapshot.docs;
    renderFilteredTable();

  }, error => {

    console.error("Fehler bei Live-Daten:", error);
    alert("Fehler beim Laden der Firebase-Daten.");

  });

}

function openAdd(){
  editId = null;

  document.getElementById("modalTitle").innerText = "Neue Bobine";
  document.getElementById("nummer").value = "";
  document.getElementById("typ").value = "";
  document.getElementById("laenge").value = "";
  document.getElementById("baustelle").value = "";
  document.getElementById("hersteller").value = "";

  document.getElementById("modal").style.display = "block";
}

function editBobine(id){
  editId = id;

  bobinenCollection.doc(id).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    document.getElementById("modalTitle").innerText = "Bobine bearbeiten";
    document.getElementById("nummer").value = b.nummer || "";
    document.getElementById("typ").value = b.typ || "";
    document.getElementById("laenge").value = b.laenge || "";
    document.getElementById("baustelle").value = b.baustelle || "";
    document.getElementById("hersteller").value = b.hersteller || "";

    document.getElementById("modal").style.display = "block";
  }).catch(error => {
    console.error("Fehler beim Laden:", error);
    alert("Fehler beim Laden der Bobine.");
  });
}

function nummerBereinigen(wert){
  return wert.trim();
}

function nummerSchonVorhanden(nummer, aktuelleId = null){
  return bobinenCollection.where("nummer", "==", nummer).get().then(snapshot => {
    let vorhanden = false;

    snapshot.forEach(doc => {
      if(doc.id !== aktuelleId){
        vorhanden = true;
      }
    });

    return vorhanden;
  });
}

function saveBobine(){
  const nummerWert = nummerBereinigen(document.getElementById("nummer").value);

  if(nummerWert === ""){
    alert("Bitte eine Nummer eingeben.");
    return;
  }

  const data = {
    nummer: nummerWert,
    typ: document.getElementById("typ").value.trim(),
    laenge: document.getElementById("laenge").value.trim(),
    baustelle: document.getElementById("baustelle").value.trim(),
    hersteller: document.getElementById("hersteller").value.trim()
  };

  nummerSchonVorhanden(nummerWert, editId).then(vorhanden => {
    if(vorhanden){
      alert("Diese Bobinen-Nummer ist bereits im Lager vorhanden.");
      return;
    }

    if(editId){
      bobinenCollection.doc(editId).get().then(doc => {
        if(!doc.exists){
          alert("Bobine nicht gefunden.");
          return;
        }

        const alterStatus = doc.data().status || "Lager";
        data.status = alterStatus;

        return bobinenCollection.doc(editId).update(data);
      }).then(() => {
        closeModal();
      }).catch(error => {
        console.error("Fehler beim Bearbeiten:", error);
        alert("Fehler beim Speichern.");
      });
    }else{
      data.status = "Lager";

      bobinenCollection.add(data).then(() => {
        closeModal();
      }).catch(error => {
        console.error("Fehler beim Hinzufügen:", error);
        alert("Fehler beim Hinzufügen.");
      });
    }
  }).catch(error => {
    console.error("Fehler bei Nummernprüfung:", error);
    alert("Fehler bei der Prüfung der Nummer.");
  });
}

function toggleStatus(id){
  bobinenCollection.doc(id).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    if(b.status === "Lager"){
      return bobinenCollection.doc(id).update({
        status: "In Gebrauch"
      });
    }else{
      selectedId = id;
      document.getElementById("returnLaenge").value = b.laenge || "";
      document.getElementById("returnBaustelle").value = b.baustelle || "";
      document.getElementById("returnModal").style.display = "block";
    }
  }).catch(error => {
    console.error("Fehler beim Status ändern:", error);
    alert("Fehler beim Status ändern.");
  });
}

function confirmReturn(){
  if(!selectedId){
    return;
  }

  bobinenCollection.doc(selectedId).update({
    laenge: document.getElementById("returnLaenge").value.trim(),
    baustelle: document.getElementById("returnBaustelle").value.trim(),
    status: "Lager"
  }).then(() => {
    selectedId = null;
    closeModal();
  }).catch(error => {
    console.error("Fehler bei Rückgabe:", error);
    alert("Fehler beim Zurückbuchen ins Lager.");
  });
}

function deleteBobine(id){

  bobinenCollection.doc(id).get().then(doc => {

    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    const text =
      "Bobine wirklich löschen?\n\n" +
      "Nummer: " + (b.nummer || "") + "\n" +
      "Kabeltyp: " + (b.typ || "") + "\n" +
      "Länge: " + (b.laenge || "") + "\n" +
      "Baustelle: " + (b.baustelle || "") + "\n\n" +
      "Diese Bobine wird endgültig aus dem Kabellager entfernt.";

    if(confirm(text)){
      bobinenCollection.doc(id).delete().catch(error => {
        console.error("Fehler beim Löschen:", error);
        alert("Fehler beim Löschen.");
      });
    }

  }).catch(error => {
    console.error("Fehler beim Laden der Bobine:", error);
    alert("Fehler beim Laden der Bobinen-Daten.");
  });

}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("returnModal").style.display = "none";
}
</script>

</body>
</html>
