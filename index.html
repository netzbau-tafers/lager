<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagermanager</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Arial, sans-serif;
  background:#e6eaef;
  margin:40px;
  color:#222;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  gap:15px;
}

.header h1{
  margin:0;
}

.menu-wrap{
  position:relative;
}

.menu-button{
  background:#555;
  color:white;
  border:none;
  border-radius:10px;
  padding:11px 15px;
  font-size:20px;
  line-height:1;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:48px;
  min-height:44px;
  box-shadow:0 2px 6px rgba(0,0,0,0.10);
  transition:background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
}

.menu-button:hover{
  background:#333;
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(0,0,0,0.14);
}

.dropdown-menu{
  display:none;
  position:absolute;
  top:52px;
  right:0;
  min-width:220px;
  background:white;
  border:1px solid #ccc;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
  padding:8px;
  z-index:2000;
}

.dropdown-menu.open{
  display:block;
}

.dropdown-menu button{
  width:100%;
  text-align:left;
  margin:0 0 8px 0;
}

.dropdown-menu button:last-child{
  margin-bottom:0;
}

.logout-safe{
  background:#777;
}

.logout-safe:hover{
  background:#555;
}

button{
  padding:10px 14px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#3498db;
  color:white;
  margin:2px;
  font-size:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  transition:background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
}

button:hover{
  background:#2980b9;
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
}

button i{
  font-size:14px;
}

.delete{
  background:#e74c3c;
}

.delete:hover{
  background:#c0392b;
}

.reset{
  background:#7f8c8d;
}

.reset:hover{
  background:#636e72;
}

.status-btn{
  background:#2d7d46;
}

.status-btn:hover{
  background:#236338;
}

.edit-btn{
  background:#f39c12;
}

.edit-btn:hover{
  background:#d68910;
}

.back{
  background:#555;
}

.back:hover{
  background:#333;
}

.search-box{
  background:white;
  border:1px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-title{
  font-weight:bold;
  margin-bottom:10px;
}

.search-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
}

.filter-row{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  align-items:center;
  margin-top:12px;
}

#searchInput{
  margin:0;
  font-size:16px;
  padding:12px;
}

select{
  width:100%;
  padding:10px;
  margin:0;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
  background:white;
}

.info-box{
  margin-top:10px;
  margin-bottom:10px;
  font-size:14px;
  color:#444;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
  vertical-align:middle;
}

th{
  background:#2c3e50;
  color:white;
}

.inuse{
  background:#ffd9d9;
}

.instock{
  background:#d9ffd9;
}

.table-actions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1000;
  overflow-y:auto;
}

.modal-content{
  background:white;
  padding:20px;
  width:420px;
  max-width:92%;
  margin:40px auto;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  box-sizing:border-box;
  max-height:calc(100vh - 40px);
  overflow-y:auto;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

.no-results{
  text-align:center;
  background:white;
  padding:20px;
  border:1px solid #ccc;
  border-top:none;
}

.login-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f2f4f7;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:3000;
  padding:20px;
  box-sizing:border-box;
}

.login-card{
  background:white;
  width:420px;
  max-width:95%;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  box-sizing:border-box;
}

.login-card h2{
  margin-top:0;
  text-align:center;
}

.login-error{
  color:#c0392b;
  display:none;
  margin-top:10px;
  text-align:center;
}

.login-info{
  color:#555;
  font-size:14px;
  text-align:center;
  margin-bottom:15px;
}

@media (max-width: 900px){
  body{
    margin:15px;
  }

  .header{
    margin-bottom:20px;
  }

  .header h1{
    font-size:28px;
  }

  button{
    font-size:16px;
    padding:12px 16px;
  }

  .menu-button{
    font-size:22px;
    padding:12px 16px;
  }

  .dropdown-menu{
    min-width:240px;
  }

  .search-row{
    grid-template-columns:1fr;
  }

  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  table{
    background:transparent;
    box-shadow:none;
  }

  tr{
    background:white;
    margin-bottom:15px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
  }

  td{
    border:none;
    text-align:left;
    padding:6px 0;
  }

  td:before{
    font-weight:bold;
    display:block;
    margin-bottom:2px;
    color:#333;
  }

  td:nth-child(1):before{content:"Nummer";}
  td:nth-child(2):before{content:"Kabeltyp";}
  td:nth-child(3):before{content:"Länge";}
  td:nth-child(4):before{content:"Baustelle";}
  td:nth-child(5):before{content:"Hersteller";}
  td:nth-child(6):before{content:"Hinzugefügt am";}
  td:nth-child(7):before{content:"Status";}
  td:nth-child(8):before{content:"Aktionen";}

  .table-actions{
    justify-content:flex-start;
  }

  .modal-content{
    width:95%;
    margin:20px auto;
    max-height:calc(100vh - 20px);
  }
}
</style>
</head>

<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Login Kabellager</h2>
    <div class="login-info">Bitte mit E-Mail und Passwort anmelden</div>
    <input id="loginEmail" type="email" placeholder="E-Mail" maxlength="120" autocomplete="username">
    <input id="loginPassword" type="password" placeholder="Passwort" maxlength="120" autocomplete="current-password">
    <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    <p id="loginError" class="login-error">Login fehlgeschlagen. Bitte Daten prüfen.</p>
  </div>
</div>

<div id="appContent" style="display:none;">

<div class="header">
  <h1>Kabellager</h1>

  <div class="menu-wrap">
    <button class="menu-button" onclick="toggleMenu(event)" title="Menü öffnen">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div id="dropdownMenu" class="dropdown-menu">
      <button onclick="goToBaustellenmaterial()"><i class="fa-solid fa-screwdriver-wrench"></i> Baustellenmaterial</button>
      <button onclick="goToArchiv()"><i class="fa-solid fa-box-archive"></i> Archiv</button>
      <button onclick="goToLogs()"><i class="fa-solid fa-clipboard-list"></i> Logs</button>
      <button class="logout-safe" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </div>
</div>

<div class="search-box">
  <div class="search-title">Suche</div>
  <div class="search-row">
    <input id="searchInput" type="text" placeholder="Nach Nummer, Kabeltyp oder Baustelle suchen" oninput="renderFilteredTable()" maxlength="120">
    <button class="reset" onclick="resetSearch()"><i class="fa-solid fa-rotate-left"></i> Suche zurücksetzen</button>
  </div>

  <div class="filter-row">
    <select id="statusFilter" onchange="renderFilteredTable()">
      <option value="Alle">Alle</option>
      <option value="Lager">Lager</option>
      <option value="In Gebrauch">In Gebrauch</option>
    </select>
  </div>

  <div style="margin-top:15px;">
    <button onclick="openAdd()"><i class="fa-solid fa-plus"></i> Neue Bobine hinzufügen</button>
  </div>
</div>

<div class="info-box" id="resultInfo"></div>

<table>
  <thead>
    <tr>
      <th>Nummer</th>
      <th>Kabeltyp</th>
      <th>Länge</th>
      <th>Baustelle</th>
      <th>Hersteller</th>
      <th>Hinzugefügt am</th>
      <th>Status</th>
      <th>Aktionen</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<div id="noResults" class="no-results" style="display:none;">
  Keine passenden Bobinen gefunden.
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Neue Bobine</h3>

    <input id="nummer" placeholder="Nummer" maxlength="60">
    <input id="typ" placeholder="Kabeltyp" maxlength="120">
    <input id="laenge" placeholder="Länge (m)" maxlength="40">
    <input id="baustelle" placeholder="Baustelle" maxlength="120">
    <input id="hersteller" placeholder="Hersteller" maxlength="120">

    <button onclick="saveBobine()"><i class="fa-solid fa-floppy-disk"></i> Speichern</button>
    <button class="back" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Abbrechen</button>
  </div>
</div>

<div id="returnModal" class="modal">
  <div class="modal-content">
    <h3>Bobine zurück ins Lager</h3>

    <p>Länge aktualisieren</p>
    <input id="returnLaenge" placeholder="Länge (m)" maxlength="40">

    <p>Baustelle</p>
    <input id="returnBaustelle" placeholder="Baustelle" maxlength="120">

    <button onclick="confirmReturn()"><i class="fa-solid fa-floppy-disk"></i> Speichern</button>
    <button class="back" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Abbrechen</button>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAfmH7jDf1kZQpk-Psbl2kvAvzZj3jGX-w",
  authDomain: "netzbau-tafers.firebaseapp.com",
  projectId: "netzbau-tafers",
  storageBucket: "netzbau-tafers.appspot.com",
  messagingSenderId: "389541837675",
  appId: "1:389541837675:web:db580ce67c57a9a16dea2e",
  measurementId: "G-B5MJGD3108"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const bobinenCollection = db.collection("bobinen");
const logsCollection = db.collection("logs");

let editId = null;
let selectedId = null;
let alleBobinen = [];
let unsubscribeBobinen = null;

function writeLog(bereich, aktion, objektTyp, objektId, details){
  const user = auth.currentUser;

  return logsCollection.add({
    bereich: bereich,
    aktion: aktion,
    objektTyp: objektTyp,
    objektId: objektId || "",
    benutzerEmail: user && user.email ? user.email : "",
    benutzerUid: user && user.uid ? user.uid : "",
    details: details || "",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(error => {
    console.error("Fehler beim Schreiben des Logs:", error);
  });
}

function sanitizeInput(value, maxLength = 200){
  return String(value || "")
    .replace(/[<>]/g, "")
    .replace(/[\u0000-\u001F\u007F]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, maxLength);
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatDatum(value){
  if(!value){
    return "";
  }

  try{
    if(typeof value.toDate === "function"){
      return value.toDate().toLocaleDateString("de-CH");
    }

    if(value.seconds){
      return new Date(value.seconds * 1000).toLocaleDateString("de-CH");
    }

    return new Date(value).toLocaleDateString("de-CH");
  }catch(error){
    return "";
  }
}

function toggleMenu(event){
  if(event){
    event.stopPropagation();
  }

  const menu = document.getElementById("dropdownMenu");
  if(!menu){
    return;
  }

  menu.classList.toggle("open");
}

function closeMenu(){
  const menu = document.getElementById("dropdownMenu");
  if(menu){
    menu.classList.remove("open");
  }
}

function goToBaustellenmaterial(){
  closeMenu();
  window.location.href = "baustellen.html";
}
  
function goToArchiv(){
  closeMenu();
  window.location.href = "archiv.html";
}

function goToLogs(){
  closeMenu();
  window.location.href = "logs.html";
}

document.addEventListener("click", function(event){
  const menu = document.getElementById("dropdownMenu");
  const menuWrap = document.querySelector(".menu-wrap");

  if(!menu || !menuWrap){
    return;
  }

  if(!menuWrap.contains(event.target)){
    closeMenu();
  }
});

function login(){
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("loginError").style.display = "none";
      document.getElementById("loginPassword").value = "";
    })
    .catch((error) => {
      console.error("Login Fehler:", error);
      document.getElementById("loginError").style.display = "block";
    });
}

function logout(){
  closeMenu();

  if(!confirm("Wirklich ausloggen?")){
    return;
  }

  stopListeners();

  auth.signOut().catch((error) => {
    console.error("Logout Fehler:", error);
    alert("Fehler beim Logout.");
  });
}

function stopListeners(){
  if(unsubscribeBobinen){
    unsubscribeBobinen();
    unsubscribeBobinen = null;
  }
}

auth.onAuthStateChanged((user) => {
  if(user){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    startDatabaseListener();
  }else{
    stopListeners();
    closeMenu();
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("appContent").style.display = "none";
    document.getElementById("table").innerHTML = "";
    document.getElementById("resultInfo").innerText = "";
    document.getElementById("noResults").style.display = "none";
    alleBobinen = [];
  }
});

function renderTable(data){
  const table = document.getElementById("table");
  const noResults = document.getElementById("noResults");
  table.innerHTML = "";

  if(data.length === 0){
    noResults.style.display = "block";
  }else{
    noResults.style.display = "none";
  }

  data.forEach(docItem => {
    const b = docItem.data();
    const tr = document.createElement("tr");
    const hinzugefuegtAm = formatDatum(b.hinzugefuegtAm);

    tr.className = b.status === "Lager" ? "instock" : "inuse";

    const statusButtonText = b.status === "Lager" ? "In Gebrauch" : "Zurück ins Lager";
    const statusButtonIcon = b.status === "Lager" ? "fa-arrow-right" : "fa-rotate-left";

    tr.innerHTML = `
      <td>${escapeHtml(b.nummer || "")}</td>
      <td>${escapeHtml(b.typ || "")}</td>
      <td>${escapeHtml(b.laenge || "")}</td>
      <td>${escapeHtml(b.baustelle || "")}</td>
      <td>${escapeHtml(b.hersteller || "")}</td>
      <td>${escapeHtml(hinzugefuegtAm || "")}</td>
      <td>${escapeHtml(b.status || "")}</td>
      <td>
        <div class="table-actions">
          <button class="status-btn" onclick="toggleStatus('${docItem.id}')">
            <i class="fa-solid ${statusButtonIcon}"></i> ${statusButtonText}
          </button>
          <button class="edit-btn" onclick="editBobine('${docItem.id}')">
            <i class="fa-solid fa-pen"></i> Bearbeiten
          </button>
          <button class="delete" onclick="deleteBobine('${docItem.id}')">
            <i class="fa-solid fa-trash"></i> Löschen
          </button>
        </div>
      </td>
    `;

    table.appendChild(tr);
  });

  document.getElementById("resultInfo").innerText = "Angezeigte Bobinen: " + data.length;
}

function renderFilteredTable(){
  const suchbegriff = document.getElementById("searchInput").value.trim().toLowerCase();
  const statusFilter = document.getElementById("statusFilter").value;

  const gefiltert = alleBobinen.filter(docItem => {
    const b = docItem.data();

    const nummer = String(b.nummer || "").toLowerCase();
    const typ = String(b.typ || "").toLowerCase();
    const baustelle = String(b.baustelle || "").toLowerCase();
    const status = String(b.status || "");

    const suchbegriffLeer = suchbegriff === "";
    const textPasst =
      suchbegriffLeer ||
      nummer.includes(suchbegriff) ||
      typ.includes(suchbegriff) ||
      baustelle.includes(suchbegriff);

    const statusPasst =
      statusFilter === "Alle" || status === statusFilter;

    return textPasst && statusPasst;
  });

  renderTable(gefiltert);
}

function resetSearch(){
  document.getElementById("searchInput").value = "";
  document.getElementById("statusFilter").value = "Alle";
  renderFilteredTable();
}

function startDatabaseListener(){
  if(unsubscribeBobinen){
    return;
  }

  unsubscribeBobinen = bobinenCollection.onSnapshot(snapshot => {
    alleBobinen = snapshot.docs;
    renderFilteredTable();
  }, error => {
    console.error("Fehler bei Live-Daten:", error);
    alert("Fehler beim Laden der Firebase-Daten.");
  });
}

function openAdd(){
  editId = null;

  document.getElementById("modalTitle").innerText = "Neue Bobine";
  document.getElementById("nummer").value = "";
  document.getElementById("typ").value = "";
  document.getElementById("laenge").value = "";
  document.getElementById("baustelle").value = "";
  document.getElementById("hersteller").value = "";

  document.getElementById("modal").style.display = "block";
}

function editBobine(id){
  editId = id;

  bobinenCollection.doc(id).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    document.getElementById("modalTitle").innerText = "Bobine bearbeiten";
    document.getElementById("nummer").value = sanitizeInput(b.nummer || "", 60);
    document.getElementById("typ").value = sanitizeInput(b.typ || "", 120);
    document.getElementById("laenge").value = sanitizeInput(b.laenge || "", 40);
    document.getElementById("baustelle").value = sanitizeInput(b.baustelle || "", 120);
    document.getElementById("hersteller").value = sanitizeInput(b.hersteller || "", 120);

    document.getElementById("modal").style.display = "block";
  }).catch(error => {
    console.error("Fehler beim Laden:", error);
    alert("Fehler beim Laden der Bobine.");
  });
}

function nummerBereinigen(wert){
  return sanitizeInput(wert, 60);
}

function nummerSchonVorhanden(nummer, aktuelleId = null){
  return bobinenCollection.where("nummer", "==", nummer).get().then(snapshot => {
    let vorhanden = false;

    snapshot.forEach(doc => {
      if(doc.id !== aktuelleId){
        vorhanden = true;
      }
    });

    return vorhanden;
  });
}

function saveBobine(){
  const nummerWert = nummerBereinigen(document.getElementById("nummer").value);
  const typ = sanitizeInput(document.getElementById("typ").value, 120);
  const laenge = sanitizeInput(document.getElementById("laenge").value, 40);
  const baustelle = sanitizeInput(document.getElementById("baustelle").value, 120);
  const hersteller = sanitizeInput(document.getElementById("hersteller").value, 120);

  document.getElementById("nummer").value = nummerWert;
  document.getElementById("typ").value = typ;
  document.getElementById("laenge").value = laenge;
  document.getElementById("baustelle").value = baustelle;
  document.getElementById("hersteller").value = hersteller;

  if(nummerWert === ""){
    alert("Bitte eine Nummer eingeben.");
    return;
  }

  const data = {
    nummer: nummerWert,
    typ: typ,
    laenge: laenge,
    baustelle: baustelle,
    hersteller: hersteller
  };

  nummerSchonVorhanden(nummerWert, editId).then(vorhanden => {
    if(vorhanden){
      alert("Diese Bobinen-Nummer ist bereits im Lager vorhanden.");
      return;
    }

    if(editId){
      bobinenCollection.doc(editId).get().then(doc => {
        if(!doc.exists){
          alert("Bobine nicht gefunden.");
          return;
        }

        const alterStatus = doc.data().status || "Lager";
        data.status = alterStatus;

        return bobinenCollection.doc(editId).update(data).then(() => {
          writeLog(
            "Kabellager",
            "Bobine bearbeitet",
            "bobine",
            editId,
            "Nummer: " + nummerWert +
            " | Typ: " + typ +
            " | Länge: " + laenge +
            " | Baustelle: " + baustelle +
            " | Hersteller: " + hersteller +
            " | Status: " + alterStatus
          );
        });
      }).then(() => {
        closeModal();
      }).catch(error => {
        console.error("Fehler beim Bearbeiten:", error);
        alert("Fehler beim Speichern.");
      });
    }else{
      data.status = "Lager";
      data.hinzugefuegtAm = firebase.firestore.FieldValue.serverTimestamp();

      bobinenCollection.add(data).then((docRef) => {
        writeLog(
          "Kabellager",
          "Bobine erstellt",
          "bobine",
          docRef.id,
          "Nummer: " + nummerWert +
          " | Typ: " + typ +
          " | Länge: " + laenge +
          " | Baustelle: " + baustelle +
          " | Hersteller: " + hersteller
        );
        closeModal();
      }).catch(error => {
        console.error("Fehler beim Hinzufügen:", error);
        alert("Fehler beim Hinzufügen.");
      });
    }
  }).catch(error => {
    console.error("Fehler bei Nummernprüfung:", error);
    alert("Fehler bei der Prüfung der Nummer.");
  });
}

function toggleStatus(id){
  bobinenCollection.doc(id).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

if(b.status === "Lager"){
  return bobinenCollection.doc(id).update({
    status: "In Gebrauch"
  }).then(() => {
    writeLog(
      "Kabellager",
      "Bobine auf In Gebrauch gesetzt",
      "bobine",
      id,
      "Nummer: " + (b.nummer || "") +
      " | Typ: " + (b.typ || "") +
      " | Länge: " + (b.laenge || "") +
      " | Baustelle: " + (b.baustelle || "") +
      " | Hersteller: " + (b.hersteller || "")
    );
  });
}else{
      selectedId = id;
      document.getElementById("returnLaenge").value = sanitizeInput(b.laenge || "", 40);
      document.getElementById("returnBaustelle").value = sanitizeInput(b.baustelle || "", 120);
      document.getElementById("returnModal").style.display = "block";
    }
  }).catch(error => {
    console.error("Fehler beim Status ändern:", error);
    alert("Fehler beim Status ändern.");
  });
}

function confirmReturn(){
  if(!selectedId){
    return;
  }

  const returnLaenge = sanitizeInput(document.getElementById("returnLaenge").value, 40);
  const returnBaustelle = sanitizeInput(document.getElementById("returnBaustelle").value, 120);

  document.getElementById("returnLaenge").value = returnLaenge;
  document.getElementById("returnBaustelle").value = returnBaustelle;

  bobinenCollection.doc(selectedId).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    return bobinenCollection.doc(selectedId).update({
      laenge: returnLaenge,
      baustelle: returnBaustelle,
      status: "Lager"
    }).then(() => {
      writeLog(
        "Kabellager",
        "Bobine zurück ins Lager gebucht",
        "bobine",
        selectedId,
        "Nummer: " + (b.nummer || "") +
        " | Typ: " + (b.typ || "") +
        " | Neue Länge: " + returnLaenge +
        " | Baustelle: " + returnBaustelle
      );
      selectedId = null;
      closeModal();
    });
  }).catch(error => {
    console.error("Fehler bei Rückgabe:", error);
    alert("Fehler beim Zurückbuchen ins Lager.");
  });
}

function deleteBobine(id){
  bobinenCollection.doc(id).get().then(doc => {
    if(!doc.exists){
      alert("Bobine nicht gefunden.");
      return;
    }

    const b = doc.data();

    const text =
      "Bobine wirklich löschen?\n\n" +
      "Nummer: " + sanitizeInput(b.nummer || "", 60) + "\n" +
      "Kabeltyp: " + sanitizeInput(b.typ || "", 120) + "\n" +
      "Länge: " + sanitizeInput(b.laenge || "", 40) + "\n" +
      "Baustelle: " + sanitizeInput(b.baustelle || "", 120) + "\n\n" +
      "Diese Bobine wird endgültig aus dem Kabellager entfernt.";

    if(confirm(text)){
      bobinenCollection.doc(id).delete().then(() => {
        writeLog(
          "Kabellager",
          "Bobine gelöscht",
          "bobine",
          id,
          "Nummer: " + (b.nummer || "") +
          " | Typ: " + (b.typ || "") +
          " | Länge: " + (b.laenge || "") +
          " | Baustelle: " + (b.baustelle || "") +
          " | Hersteller: " + (b.hersteller || "")
        );
      }).catch(error => {
        console.error("Fehler beim Löschen:", error);
        alert("Fehler beim Löschen.");
      });
    }
  }).catch(error => {
    console.error("Fehler beim Laden der Bobine:", error);
    alert("Fehler beim Laden der Bobinen-Daten.");
  });
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("returnModal").style.display = "none";
}

window.onclick = function(event){
  const modal = document.getElementById("modal");
  const returnModal = document.getElementById("returnModal");

  if(event.target === modal){
    closeModal();
  }

  if(event.target === returnModal){
    closeModal();
  }
}
</script>
